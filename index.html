<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WildDex</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#74ebd5,#acb6e5);
}

header{
background:#333;
color:white;
padding:15px;
text-align:center;
font-size:26px;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
}

.tab{
padding:10px 20px;
background:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.section{
display:none;
padding:20px;
}

.active{
display:block;
}

select,button{
padding:10px;
font-size:16px;
margin:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:18px;
justify-content:center;
}

/* CARD */

.card{
border-radius:14px;
padding:10px;
color:white;
text-align:center;
cursor:pointer;
box-shadow:0 6px 14px rgba(0,0,0,0.25);
}

/* TYPE COLORS */

.grass{background:linear-gradient(#4caf50,#7bd87b);}
.fire{background:linear-gradient(#ff7043,#ffb347);}
.water{background:linear-gradient(#42a5f5,#7ec8ff);}
.air{background:linear-gradient(#90caf9,#cfe9ff);}
.dark{background:linear-gradient(#555,#777);}

/* CARD HEADER */

.cardHeader{
display:flex;
justify-content:space-between;
font-size:12px;
margin-bottom:6px;
font-weight:bold;
}

/* IMAGE */

.card img{
width:100%;
height:130px;
object-fit:cover;
border-radius:8px;
background:white;
}

/* NAME */

.card h3{
margin:8px 0 0;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.modalContent{
background:white;
padding:20px;
border-radius:12px;
width:320px;
text-align:center;
}

.modalContent img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.releaseBtn{
background:#ff4444;
color:white;
border:none;
padding:10px 15px;
margin-top:10px;
cursor:pointer;
border-radius:6px;
}

.closeBtn{
margin-top:10px;
padding:6px 10px;
}

</style>
</head>

<body>

<header>🌍 WildDex</header>

<div class="tabs">
<div class="tab" onclick="openTab('log')">Log</div>
<div class="tab" onclick="openTab('catches')">Catches</div>
</div>

<div id="log" class="section active">

<select id="animalSelect">
<option value="">Select Animal</option>
</select>

<button onclick="logAnimal()">Log Animal</button>

</div>

<div id="catches" class="section">
<div class="grid" id="grid"></div>
</div>

<div id="modal" class="modal">
<div class="modalContent" id="modalContent"></div>
</div>

<script>

const animalDatabase=[

{
name:"Blue Whale",
scientific:"Balaenoptera musculus",
type:"water",
image:"https://upload.wikimedia.org/wikipedia/commons/5/56/Bluewhale2.jpg"
},

{
name:"Tiger",
scientific:"Panthera tigris",
type:"fire",
image:"https://upload.wikimedia.org/wikipedia/commons/5/56/Tiger.50.jpg"
},

{
name:"Bald Eagle",
scientific:"Haliaeetus leucocephalus",
type:"air",
image:"https://upload.wikimedia.org/wikipedia/commons/1/1a/Bald_Eagle_Portrait.jpg"
},

{
name:"Oak Tree Frog",
scientific:"Dryophytes quercicus",
type:"grass",
image:"https://upload.wikimedia.org/wikipedia/commons/7/7b/Oak_treefrog.jpg"
},

{
name:"Lesser Horseshoe Bat",
scientific:"Rhinolophus hipposideros",
type:"dark",
image:"https://upload.wikimedia.org/wikipedia/commons/f/f2/Rhinolophus_hipposideros.jpg"
}

]

let loggedAnimals=JSON.parse(localStorage.getItem("wilddex"))||[]

const select=document.getElementById("animalSelect")

animalDatabase.forEach(a=>{
let option=document.createElement("option")
option.value=a.name
option.textContent=a.name
select.appendChild(option)
})

function logAnimal(){

const name=select.value

if(!name)return

if(loggedAnimals.find(a=>a.name===name)){
alert("Animal already logged!")
return
}

const animal=animalDatabase.find(a=>a.name===name)

loggedAnimals.push(animal)

localStorage.setItem("wilddex",JSON.stringify(loggedAnimals))

renderCards()

}

function renderCards(){

const grid=document.getElementById("grid")

grid.innerHTML=""

loggedAnimals.forEach((a,index)=>{

let card=document.createElement("div")

card.className=`card ${a.type}`

card.innerHTML=`

<div class="cardHeader">
<span>${a.type.toUpperCase()}</span>
<span>HP 50</span>
</div>

<img src="${a.image}" onerror="this.src='https://via.placeholder.com/300x180?text=No+Image'">

<h3>${a.name}</h3>

`

card.onclick=()=>openModal(index)

grid.appendChild(card)

})

}

renderCards()

function openModal(index){

const a=loggedAnimals[index]

const modal=document.getElementById("modal")

const content=document.getElementById("modalContent")

content.innerHTML=`

<img src="${a.image}">

<h2>${a.name}</h2>

<p><i>${a.scientific}</i></p>

<p>Element: ${a.type}</p>

<button class="releaseBtn" onclick="releaseAnimal(${index})">Release Animal</button>

<br>

<button class="closeBtn" onclick="closeModal()">Close</button>

`

modal.style.display="flex"

}

function closeModal(){
document.getElementById("modal").style.display="none"
}

function releaseAnimal(index){

loggedAnimals.splice(index,1)

localStorage.setItem("wilddex",JSON.stringify(loggedAnimals))

closeModal()

renderCards()

}

function openTab(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

</script>

</body>
</html>

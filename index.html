<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Animal Collector</title>

<style>

body{
font-family:sans-serif;
background:linear-gradient(#87d7ff,#e8f7ff);
margin:0;
text-align:center;
}

header{
background:#2c3e50;
color:white;
padding:15px;
font-size:24px;
}

nav button{
margin:5px;
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

.tab{
display:none;
padding:20px;
}

.active{
display:block;
}

#collection{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.card{
width:200px;
border-radius:12px;
padding:10px;
color:white;
cursor:pointer;
position:relative;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
background:#ddd;
}

.scientific{
font-style:italic;
font-size:12px;
}

.element-symbols{
font-size:20px;
}

.common{}
.uncommon{box-shadow:0 0 10px #4caf50}
.rare{box-shadow:0 0 12px #2196f3}
.legendary{box-shadow:0 0 14px gold}

.card.fire{background:linear-gradient(#ff7043,#ff3d00)}
.card.water{background:linear-gradient(#42a5f5,#1e88e5)}
.card.grass{background:linear-gradient(#66bb6a,#2e7d32)}
.card.flying{background:linear-gradient(#90caf9,#42a5f5)}
.card.ice{background:linear-gradient(#b3e5fc,#4fc3f7)}
.card.dark{background:linear-gradient(#616161,#212121)}
.card.poison{background:linear-gradient(#ba68c8,#7b1fa2)}
.card.bug{background:linear-gradient(#aed581,#7cb342)}

#animalModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
color:black;
padding:20px;
border-radius:10px;
width:300px;
}

</style>
</head>

<body>

<header>Animal Collector</header>

<nav>
<button onclick="showTab('log')">Log</button>
<button onclick="showTab('catches')">Catches</button>
<button onclick="showTab('badges')">Badges</button>
</nav>

<div id="log" class="tab active">

<h2>Log Animal</h2>

<input list="animalList" id="animalInput">
<datalist id="animalList"></datalist>

<br><br>

<button onclick="logAnimal()">Log Animal</button>

</div>

<div id="catches" class="tab">

<h2>Your Catches</h2>

<div id="collection"></div>

</div>

<div id="badges" class="tab">

<h2>Badges</h2>

<div id="badgeList"></div>

</div>

<div id="animalModal">

<div class="modal-content" id="modalContent"></div>

</div>

<script>

const elementSymbols={
fire:"🔥",
water:"💧",
grass:"🌿",
flying:"🪽",
ice:"❄️",
dark:"🌙",
poison:"☠️",
bug:"🐛"
}

const animals=[

{name:"African Lion",scientific:"Panthera leo",type:"fire",continent:"Africa",rarity:"rare",atk:80,def:70,image:"https://upload.wikimedia.org/wikipedia/commons/7/73/Lion_waiting_in_Namibia.jpg"},
{name:"Blue Whale",scientific:"Balaenoptera musculus",type:"water",continent:"Oceans",rarity:"legendary",atk:90,def:90,image:"https://upload.wikimedia.org/wikipedia/commons/5/5e/Bluewhale1.jpg"},
{name:"Polar Bear",scientific:"Ursus maritimus",type:"ice",continent:"Arctic",rarity:"rare",atk:75,def:80,image:"https://upload.wikimedia.org/wikipedia/commons/e/e2/Polar_Bear_-_Alaska.jpg"},
{name:"Bald Eagle",scientific:"Haliaeetus leucocephalus",type:"flying",continent:"North America",rarity:"uncommon",atk:60,def:50,image:"https://upload.wikimedia.org/wikipedia/commons/1/1a/Bald_Eagle_Portrait.jpg"},
{name:"Poison Dart Frog",scientific:"Dendrobatidae",type:"poison",continent:"South America",rarity:"uncommon",atk:40,def:30,image:"https://upload.wikimedia.org/wikipedia/commons/f/f3/Dendrobates_pumilio.jpg"},
{name:"Ladybug",scientific:"Coccinellidae",type:"bug",continent:"Europe",rarity:"common",atk:20,def:15,image:"https://upload.wikimedia.org/wikipedia/commons/7/70/Coccinella_septempunctata.jpg"},
{name:"Barn Owl",scientific:"Tyto alba",type:["flying","dark"],continent:"Europe",rarity:"uncommon",atk:50,def:45,image:"https://upload.wikimedia.org/wikipedia/commons/1/19/Tyto_alba_-British_Wildlife_Centre-8a.jpg"},
{name:"Lesser Horseshoe Bat",scientific:"Rhinolophus hipposideros",type:["dark","flying"],continent:"Europe",rarity:"uncommon",atk:45,def:35,image:"https://upload.wikimedia.org/wikipedia/commons/6/69/Rhinolophus_hipposideros.jpg"},
{name:"Axolotl",scientific:"Ambystoma mexicanum",type:"water",continent:"North America",rarity:"rare",atk:45,def:60,image:"https://upload.wikimedia.org/wikipedia/commons/3/35/Axolotl_Standing.jpg"},
{name:"Komodo Dragon",scientific:"Varanus komodoensis",type:"poison",continent:"Asia",rarity:"rare",atk:70,def:60,image:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Komodo_dragon_with_tongue.jpg"},
{name:"Emperor Penguin",scientific:"Aptenodytes forsteri",type:["ice","water"],continent:"Antarctica",rarity:"uncommon",atk:35,def:45,image:"https://upload.wikimedia.org/wikipedia/commons/0/0b/Emperor_penguin.jpg"},
{name:"Red Fox",scientific:"Vulpes vulpes",type:"dark",continent:"Europe",rarity:"common",atk:45,def:35,image:"https://upload.wikimedia.org/wikipedia/commons/1/16/2010-kodiak-red-fox.jpg"},
{name:"Giant Panda",scientific:"Ailuropoda melanoleuca",type:"grass",continent:"Asia",rarity:"rare",atk:40,def:70,image:"https://upload.wikimedia.org/wikipedia/commons/0/0f/Grosser_Panda.JPG"},
{name:"Great White Shark",scientific:"Carcharodon carcharias",type:["water","dark"],continent:"Oceans",rarity:"rare",atk:85,def:60,image:"https://upload.wikimedia.org/wikipedia/commons/5/56/White_shark.jpg"},
{name:"Monarch Butterfly",scientific:"Danaus plexippus",type:["bug","flying"],continent:"North America",rarity:"common",atk:15,def:15,image:"https://upload.wikimedia.org/wikipedia/commons/4/4c/Monarch_Butterfly.jpg"},
{name:"Snow Leopard",scientific:"Panthera uncia",type:["ice","dark"],continent:"Asia",rarity:"rare",atk:75,def:55,image:"https://upload.wikimedia.org/wikipedia/commons/0/0f/Snow_leopard_portrait.jpg"},
{name:"Tiger",scientific:"Panthera tigris",type:"fire",continent:"Asia",rarity:"rare",atk:85,def:65,image:"https://upload.wikimedia.org/wikipedia/commons/5/56/Tiger.50.jpg"},
{name:"Honey Bee",scientific:"Apis mellifera",type:"bug",continent:"Europe",rarity:"common",atk:10,def:10,image:"https://upload.wikimedia.org/wikipedia/commons/4/4a/Apis_mellifera_Western_honey_bee.jpg"},
{name:"Orca",scientific:"Orcinus orca",type:["water","dark"],continent:"Oceans",rarity:"rare",atk:90,def:70,image:"https://upload.wikimedia.org/wikipedia/commons/3/37/Killerwhales_jumping.jpg"},
{name:"Golden Eagle",scientific:"Aquila chrysaetos",type:"flying",continent:"Europe",rarity:"uncommon",atk:65,def:55,image:"https://upload.wikimedia.org/wikipedia/commons/1/1a/Golden_Eagle_in_flight.jpg"}

]

let logged=[]

function populateList(){

const list=document.getElementById("animalList")

animals.forEach(a=>{

let option=document.createElement("option")
option.value=a.name
list.appendChild(option)

})

}

function logAnimal(){

let name=document.getElementById("animalInput").value

let animal=animals.find(a=>a.name===name)

if(!animal)return

if(logged.find(a=>a.name===name))return

logged.push(animal)

renderCollection()

}

function renderCollection(){

const container=document.getElementById("collection")

container.innerHTML=""

logged.forEach(animal=>{

let types=Array.isArray(animal.type)?animal.type:[animal.type]

let primary=types[0]

let symbols=types.map(t=>elementSymbols[t]).join(" ")

let card=document.createElement("div")

card.className="card "+primary+" "+animal.rarity

card.innerHTML=`

<img src="${animal.image}" onerror="this.style.visibility='hidden'">

<h3>${animal.name}</h3>

<p class="scientific">${animal.scientific}</p>

<div class="element-symbols">${symbols}</div>

<p>${animal.continent}</p>

<p>ATK ${animal.atk} | DEF ${animal.def}</p>

`

card.onclick=()=>openAnimalCard(animal)

container.appendChild(card)

})

}

function openAnimalCard(animal){

const modal=document.getElementById("animalModal")

const content=document.getElementById("modalContent")

let types=Array.isArray(animal.type)?animal.type:[animal.type]

let symbols=types.map(t=>elementSymbols[t]).join(" ")

content.innerHTML=`

<h2>${animal.name}</h2>

<img src="${animal.image}" style="width:100%">

<p><i>${animal.scientific}</i></p>

<p>Element ${symbols}</p>

<p>Continent ${animal.continent}</p>

<p>ATK ${animal.atk}</p>

<p>DEF ${animal.def}</p>

<br>

<button onclick="releaseAnimal('${animal.name}')">Release Animal</button>

<br><br>

<button onclick="closeModal()">Close</button>

`

modal.style.display="flex"

}

function closeModal(){
document.getElementById("animalModal").style.display="none"
}

function releaseAnimal(name){

logged=logged.filter(a=>a.name!==name)

closeModal()

renderCollection()

}

function showTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(tab).classList.add("active")

}

populateList()

</script>

</body>
</html>

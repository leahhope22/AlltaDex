<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WildDex</title>

<style>
body{
  font-family:Verdana;
  background:#aaf0c6;
  margin:0;
  text-align:center;
}

h1{margin-top:15px;}

.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.tab{
  padding:8px 14px;
  border-radius:10px;
  background:#ddd;
  cursor:pointer;
}

.tab.active{background:#bbb;}

.page{display:none;}
.page.active{display:block;}

.grid{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
  padding:20px;
}

.card{
  width:220px;
  height:340px;
  border-radius:16px;
  overflow:hidden;
  position:relative;
  border:2px solid rgba(0,0,0,.2);
  transition:.2s;
  color:#111;
  cursor:pointer;
}

.card:hover{transform:scale(1.03);}

.card-header{
  display:flex;
  justify-content:space-between;
  padding:6px 8px;
  font-weight:bold;
  font-size:14px;
}

.image-container{
  width:100%;
  height:160px;
  background:white;
  overflow:hidden;
}

.image-container img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card-body{
  padding:8px;
}

.scientific{
  font-style:italic;
  font-size:13px;
  opacity:.7;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
}

.footer{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
  font-size:18px;
}

/* Modal */

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.6);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  padding:25px;
  border-radius:16px;
  width:320px;
}

.close{
  float:right;
  cursor:pointer;
  font-size:20px;
}

#releaseBtn{
  margin-top:15px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff5c5c;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<h1>WildDex</h1>

<div class="tabs">
  <div class="tab active" onclick="openPage('log')">Log</div>
  <div class="tab" onclick="openPage('catches')">Catches</div>
  <div class="tab" onclick="openPage('badges')">Badges</div>
</div>

<div id="log" class="page active">
  <input id="animalInput" list="animals" placeholder="Log animal">
  <datalist id="animals"></datalist>
  <button onclick="logAnimal()">Log</button>
</div>

<div id="catches" class="page">

  <input id="searchBox" placeholder="Search animals" oninput="renderCollection()">

  <select id="filterElement" onchange="renderCollection()">
      <option value="all">All Elements</option>
      <option value="fire">Fire</option>
      <option value="water">Water</option>
      <option value="grass">Grass</option>
      <option value="ice">Ice</option>
      <option value="flying">Flying</option>
      <option value="dark">Dark</option>
      <option value="poison">Poison</option>
      <option value="bug">Bug</option>
      <option value="electric">Electric</option>
  </select>

  <div id="collection" class="grid"></div>
</div>

<div id="badges" class="page">
  <div id="badgeArea"></div>
</div>

<!-- Modal -->

<div id="animalModal" class="modal">
  <div class="modal-content">

    <span class="close" onclick="closeModal()">✖</span>

    <h2 id="modalName"></h2>
    <p id="modalScientific"></p>
    <p id="modalMove"></p>
    <p id="modalStats"></p>
    <p id="modalType"></p>
    <p id="modalContinent"></p>

    <button id="releaseBtn">Release</button>

  </div>
</div>

<script>

const typeIcons={
fire:"🔥",water:"💧",grass:"🌿",ice:"❄️",
flying:"🕊️",dark:"🌑",poison:"☣️",bug:"🐛",electric:"⚡"
};

const continentIcons={
Africa:"🌍",Europe:"🌍",Asia:"🌏",
NorthAmerica:"🌎",SouthAmerica:"🌎",
Australia:"🦘",Antarctica:"🧊"
};

const animals=[
{name:"Red Fox",scientific:"Vulpes vulpes",type:"fire",continent:"Europe",rarity:"common",atk:50,def:40,move:"Blaze Dash"},
{name:"European Hedgehog",scientific:"Erinaceus europaeus",type:"grass",continent:"Europe",rarity:"common",atk:35,def:50,move:"Spike Roll"},
{name:"Barn Owl",scientific:"Tyto alba",type:"flying",continent:"Europe",rarity:"uncommon",atk:50,def:40,move:"Silent Glide"},
{name:"Wild Boar",scientific:"Sus scrofa",type:"dark",continent:"Europe",rarity:"uncommon",atk:70,def:65,move:"Tusk Rush"},
{name:"European Otter",scientific:"Lutra lutra",type:"water",continent:"Europe",rarity:"uncommon",atk:55,def:50,move:"River Dash"},
{name:"Honey Bee",scientific:"Apis mellifera",type:"bug",continent:"Europe",rarity:"common",atk:30,def:25,move:"Sting Swarm"},
{name:"Electric Eel",scientific:"Electrophorus electricus",type:"electric",continent:"SouthAmerica",rarity:"rare",atk:85,def:60,move:"Volt Shock"}
];

const datalist=document.getElementById("animals");

animals.forEach(a=>{
let o=document.createElement("option");
o.value=a.name;
datalist.appendChild(o);
});

let logged=JSON.parse(localStorage.getItem("wilddex_logged"))||[];

function save(){
localStorage.setItem("wilddex_logged",JSON.stringify(logged));
}

function logAnimal(){

let name=document.getElementById("animalInput").value;

let animal=animals.find(a=>a.name===name);

if(!animal || logged.some(l=>l.name===name)) return;

logged.push(animal);

save();

renderCollection();

updateBadges();

}

async function getImage(name){

try{
let url=`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`;
let res=await fetch(url);
let data=await res.json();
return data.thumbnail?data.thumbnail.source:"";
}catch{return ""}

}

async function renderCollection(){

let area=document.getElementById("collection");

area.innerHTML="";

let search=document.getElementById("searchBox").value.toLowerCase();

let filter=document.getElementById("filterElement").value;

for(let a of logged){

if(search && !a.name.toLowerCase().includes(search)) continue;

if(filter!="all" && a.type!=filter) continue;

let img=await getImage(a.name);

let card=document.createElement("div");

card.className=`card`;

card.onclick=()=>openModal(a);

card.innerHTML=`

<div class="card-header">
<span>${a.name}</span>
<span>HP ${a.atk+a.def}</span>
</div>

<div class="image-container">
<img src="${img}">
</div>

<div class="card-body">

<div class="scientific">${a.scientific}</div>

<div><b>${a.move}</b></div>

<div class="stats">
<span>ATK ${a.atk}</span>
<span>DEF ${a.def}</span>
</div>

<div class="footer">
<span>${typeIcons[a.type]}</span>
<span>${continentIcons[a.continent]}</span>
</div>

</div>

`;

area.appendChild(card);

}

}

function openModal(animal){

document.getElementById("modalName").textContent=animal.name;

document.getElementById("modalScientific").textContent=animal.scientific;

document.getElementById("modalMove").textContent="Move: "+animal.move;

document.getElementById("modalStats").textContent=`ATK ${animal.atk} | DEF ${animal.def}`;

document.getElementById("modalType").textContent="Type: "+animal.type;

document.getElementById("modalContinent").textContent="Continent: "+animal.continent;

document.getElementById("animalModal").style.display="flex";

document.getElementById("releaseBtn").onclick=()=>{

logged=logged.filter(a=>a.name!==animal.name);

save();

renderCollection();

updateBadges();

closeModal();

};

}

function closeModal(){
document.getElementById("animalModal").style.display="none";
}

function updateBadges(){

let badgeArea=document.getElementById("badgeArea");

badgeArea.innerHTML="";

let continents=[...new Set(logged.map(a=>a.continent))];

let elements=[...new Set(logged.map(a=>a.type))];

if(continents.length>=3) badgeArea.innerHTML+=`<div>🌍 Explorer Badge</div>`;

if(elements.length>=3) badgeArea.innerHTML+=`<div>⚡ Elementalist Badge</div>`;

if(logged.length>=5) badgeArea.innerHTML+=`<div>📘 Field Researcher</div>`;

}

function openPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

document.getElementById(id).classList.add("active");

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

event.target.classList.add("active");

}

renderCollection();
updateBadges();

</script>
</body>
</html>

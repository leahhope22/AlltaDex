<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WildDex v12</title>
<style>
body {font-family:Arial;margin:0;background:linear-gradient(135deg,#b7e4d7,#d7f2ff);}
.tabs {display:flex;background:#2c3e50;color:white;}
.tab {padding:14px 22px;cursor:pointer;}
.tab.active {background:#1abc9c;}
.section {display:none;padding:25px;}
.section.active {display:block;}
input {padding:10px;font-size:16px;border-radius:8px;border:none;width:240px;}
button {padding:10px 18px;border:none;border-radius:8px;background:#1abc9c;color:white;font-size:16px;cursor:pointer;margin-left:10px;}
.collection {display:grid;grid-template-columns:repeat(auto-fill,260px);gap:24px;}
.card {border-radius:18px;overflow:hidden;color:white;position:relative;display:flex;flex-direction:column;transition:.25s;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.25);}
.card:hover{transform:scale(1.05);}
.card img{width:100%;height:160px;object-fit:cover;background:white;border-bottom:2px solid rgba(0,0,0,0.1);}
.card-header{display:flex;justify-content:space-between;padding:12px;font-weight:bold;}
.card-body{background:rgba(255,255,255,.9);color:black;padding:14px;height:130px;flex:1;}
.stats{display:flex;gap:20px;font-weight:bold;margin-top:8px;}
.footer{display:flex;justify-content:space-between;margin-top:10px;font-size:14px;}
.badges{display:flex;flex-wrap:wrap;gap:20px;}
.badge{background:white;padding:16px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.2);min-width:140px;text-align:center;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;}
.modal-content{background:white;padding:20px;border-radius:12px;width:400px;max-width:90%;max-height:90%;overflow-y:auto;position:relative;}
.modal-close{position:absolute;top:10px;right:12px;font-weight:bold;cursor:pointer;}
.modal img{width:100%;height:220px;object-fit:cover;border-radius:10px;margin-bottom:12px;}
.autocomplete-suggestions{border:1px solid #ccc;background:white;position:absolute;max-height:150px;overflow-y:auto;z-index:1000;width:250px;}
.autocomplete-suggestion{padding:5px;cursor:pointer;}
.autocomplete-suggestion:hover{background:#eee;}

/* Element gradients */
.fire{background:linear-gradient(135deg,#ff7b4b,#ffcc5c);}
.water{background:linear-gradient(135deg,#4facfe,#00f2fe);}
.grass{background:linear-gradient(135deg,#43e97b,#38f9d7);}
.ice{background:linear-gradient(135deg,#7de2fc,#b9b6e5);}
.flying{background:linear-gradient(135deg,#89f7fe,#66a6ff);}
.normal{background:linear-gradient(135deg,#bdbdbd,#e0e0e0);}

/* Rarity glow */
.card.rare { box-shadow:0 0 10px silver,0 10px 30px rgba(0,0,0,.25);}
.card.epic { box-shadow:0 0 15px purple,0 10px 30px rgba(0,0,0,.25);}
.card.legendary { box-shadow:0 0 20px gold,0 10px 30px rgba(0,0,0,.25);}

/* Realistic animated element borders */
.card::before {
  content:""; position:absolute; top:0; left:0; width:100%; height:100%; border-radius:18px; pointer-events:none; z-index:1;
}

/* FIRE: flickering flames */
.card.fire::before {
  background: radial-gradient(circle, rgba(255,200,0,0.3) 15%, transparent 70%);
  animation: fireFlicker 1.2s infinite alternate;
}
@keyframes fireFlicker {
  0% { box-shadow: inset 0 0 15px rgba(255,120,0,0.3); }
  50% { box-shadow: inset 0 0 30px rgba(255,200,0,0.5); transform: scale(1.02); }
  100% { box-shadow: inset 0 0 15px rgba(255,120,0,0.3); }
}

/* WATER: rising bubbles */
.card.water::before {
  background: radial-gradient(circle, rgba(255,255,255,0.3) 2px, transparent 2px);
  background-size: 12px 12px;
  animation: waterBubbles 3s linear infinite;
}
@keyframes waterBubbles {
  0% { background-position: 0 100%; }
  100% { background-position: 0 -100%; }
}

/* GRASS: waving pattern */
.card.grass::before {
  background: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0 5px, transparent 5px 10px);
  animation: grassWave 3s ease-in-out infinite;
}
@keyframes grassWave {
  0% { transform: translateY(0); }
  50% { transform: translateY(3px); }
  100% { transform: translateY(0); }
}

/* ICE: drifting snowflakes */
.card.ice::before {
  background: radial-gradient(circle, rgba(255,255,255,0.6) 2px, transparent 2px);
  background-size: 15px 15px;
  animation: iceDrift 6s linear infinite;
}
@keyframes iceDrift {
  0% { background-position: 0 0; }
  100% { background-position: 100% 100%; }
}

/* FLYING: gusts of wind */
.card.flying::before {
  background: repeating-linear-gradient(90deg, rgba(255,255,255,0.15) 0 5px, transparent 5px 10px);
  background-size: 20px 20px;
  animation: flyingWind 4s linear infinite;
}

/* NORMAL: no pattern */
.card.normal::before { background:none; }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="openTab('log', event)">Log Animal</div>
  <div class="tab" onclick="openTab('collection', event)">Collection</div>
  <div class="tab" onclick="openTab('badges', event)">Badges</div>
</div>

<div id="log" class="section active">
  <h2>Log an Animal</h2>
  <div style="position:relative;">
    <input id="animalInput" placeholder="Start typing an animal name..." oninput="showSuggestions()" autocomplete="off"/>
    <div id="suggestions" class="autocomplete-suggestions"></div>
  </div>
  <button onclick="logAnimal()">Log</button>
</div>

<div id="collection" class="section">
  <h2>My WildDex</h2>
  <div id="collectionGrid" class="collection"></div>
</div>

<div id="badges" class="section">
  <h2>Explorer Badges</h2>
  <div id="badgeContainer" class="badges"></div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">✖</span>
    <div id="modalContent"></div>
    <button onclick="releaseAnimal()">Release Animal</button>
  </div>
</div>

<script>
const animalDatabase = [
{name:"African Lion",scientific:"Panthera leo",type:"fire",continent:"Africa",image:"https://upload.wikimedia.org/wikipedia/commons/7/73/Lion_waiting_in_Namibia.jpg"},
{name:"Tiger",scientific:"Panthera tigris",type:"fire",continent:"Asia",image:"https://upload.wikimedia.org/wikipedia/commons/5/56/Tiger.50.jpg"},
{name:"Elephant",scientific:"Loxodonta africana",type:"grass",continent:"Africa",image:"https://upload.wikimedia.org/wikipedia/commons/3/37/African_Bush_Elephant.jpg"},
{name:"Giraffe",scientific:"Giraffa camelopardalis",type:"grass",continent:"Africa",image:"https://upload.wikimedia.org/wikipedia/commons/9/9f/Giraffa_camelopardalis_angolensis.jpg"},
{name:"Zebra",scientific:"Equus quagga",type:"grass",continent:"Africa",image:"https://upload.wikimedia.org/wikipedia/commons/0/0f/Plains_Zebra_Equus_quagga.jpg"},
{name:"Blue Whale",scientific:"Balaenoptera musculus",type:"water",continent:"Ocean",image:"https://upload.wikimedia.org/wikipedia/commons/5/53/Bluewhale2.jpg"},
{name:"Dolphin",scientific:"Delphinus delphis",type:"water",continent:"Ocean",image:"https://upload.wikimedia.org/wikipedia/commons/6/63/Common_dolphin_2.jpg"},
{name:"Penguin",scientific:"Aptenodytes forsteri",type:"ice",continent:"Antarctica",image:"https://upload.wikimedia.org/wikipedia/commons/e/e0/Emperor_Penguin_Manchot_empereur.jpg"},
{name:"Bald Eagle",scientific:"Haliaeetus leucocephalus",type:"flying",continent:"North America",image:"https://upload.wikimedia.org/wikipedia/commons/1/14/Bald_Eagle_Portrait.jpg"},
{name:"Polar Bear",scientific:"Ursus maritimus",type:"ice",continent:"Arctic",image:"https://upload.wikimedia.org/wikipedia/commons/e/e6/Polar_Bear_AdF.jpg"},
{name:"European Lynx",scientific:"Lynx lynx",type:"normal",continent:"Europe",image:"https://upload.wikimedia.org/wikipedia/commons/5/50/Lynx_lynx_Luc_Viatour.jpg"},
{name:"Green Finch",scientific:"Chloris chloris",type:"flying",continent:"Europe",image:"https://upload.wikimedia.org/wikipedia/commons/1/1e/Chloris_chloris01.jpg"}
];

const typeIcons = {fire:"🔥",water:"💧",grass:"🌿",ice:"❄️",flying:"🕊️",normal:"⚪"};
const continentIcons = {Africa:"🌍",Asia:"🌏",Europe:"🌍","North America":"🌎","South America":"🌎",Australia:"🌏",Antarctica:"❄️",Ocean:"🌊",Arctic:"❄️"};

let animals = JSON.parse(localStorage.getItem("wilddex"))||[];
let currentModalAnimalIndex = null;

function showSuggestions(){
  const val=document.getElementById("animalInput").value.toLowerCase();
  const sugg=document.getElementById("suggestions"); sugg.innerHTML="";
  if(!val) return;
  animalDatabase.forEach(a=>{
    if(a.name.toLowerCase().includes(val)){
      const div=document.createElement("div"); div.className="autocomplete-suggestion"; div.innerText=a.name;
      div.onclick=()=>{document.getElementById("animalInput").value=a.name; sugg.innerHTML="";}
      sugg.appendChild(div);
    }
  });
}

function random(min,max){return Math.floor(Math.random()*(max-min)+min);}
function rarity(){let r=Math.random();if(r<0.6)return"common";if(r<0.85)return"rare";if(r<0.97)return"epic";return"legendary";}

function logAnimal(){
  const name=document.getElementById("animalInput").value.trim();
  if(!name) return;
  const dbAnimal=animalDatabase.find(a=>a.name===name);
  if(!dbAnimal){alert("Animal not in database"); return;}
  let moves=["Wild Strike","Heavy Charge"];
  if(dbAnimal.type==="fire") moves=["Flame Pounce","Savage Roar"];
  if(dbAnimal.type==="water") moves=["Tidal Slam","Splash Charge"];
  if(dbAnimal.type==="grass") moves=["Vine Whip","Nature Guard"];
  if(dbAnimal.type==="ice") moves=["Frost Bite","Glacier Punch"];
  if(dbAnimal.type==="flying") moves=["Sky Dive","Wind Slash"];
  const animal={name:dbAnimal.name,scientific:dbAnimal.scientific,type:dbAnimal.type,continent:dbAnimal.continent,image:dbAnimal.image||`https://source.unsplash.com/featured/260x160/?${encodeURIComponent(dbAnimal.name)}`,atk:random(20,100),def:random(20,100),rarity:rarity(),move:moves[random(0,moves.length)]};
  animals.push(animal); localStorage.setItem("wilddex",JSON.stringify(animals)); renderCollection(); renderBadges(); document.getElementById("animalInput").value="";
}

function renderCollection(){
  const grid=document.getElementById("collectionGrid"); grid.innerHTML="";
  animals.forEach((a,i)=>{
    const card=document.createElement("div"); card.className=`card ${a.type} ${a.rarity}`; card.onclick=()=>openModal(i);
    const img=`<img src="${a.image}" onerror="this.onerror=null;this.src='https://via.placeholder.com/260x160?text=No+Image'">`;
    card.innerHTML=`<div class="card-header"><span>${a.name}</span><span>HP ${a.atk+a.def}</span></div>${img}<div class="card-body"><div><b>${a.scientific}</b></div><div><b>${a.move}</b></div><div class="stats"><span>ATK ${a.atk}</span><span>DEF ${a.def}</span></div><div class="footer"><span>${typeIcons[a.type]} ${a.type}</span><span>${continentIcons[a.continent]} ${a.continent}</span></div></div>`;
    grid.appendChild(card);
  });
}

function renderBadges(){
  let counts={}; animals.forEach(a=>{counts[a.continent]=(counts[a.continent]||0)+1;});
  const container=document.getElementById("badgeContainer"); container.innerHTML="";
  for(let c in counts){
    const badge=document.createElement("div"); badge.className="badge"; badge.innerHTML=`<b>${continentIcons[c]} ${c} Explorer</b><br>${counts[c]} animals logged`; container.appendChild(badge);
  }
}

function openModal(index){
  currentModalAnimalIndex=index;
  const a=animals[index];
  const modal=document.getElementById("modal");
  const content=document.getElementById("modalContent");
  content.innerHTML=`<img src="${a.image}" onerror="this.onerror=null;this.src='https://via.placeholder.com/400x220?text=No+Image'"><h3>${a.name}</h3><p><b>Scientific Name:</b> ${a.scientific}</p><p><b>Move:</b> ${a.move}</p><p><b>ATK:</b> ${a.atk}</p><p><b>DEF:</b> ${a.def}</p><p><b>HP:</b> ${a.atk+a.def}</p><p><b>Type:</b> ${typeIcons[a.type]} ${a.type}</p><p><b>Continent:</b> ${continentIcons[a.continent]} ${a.continent}</p><p><b>Rarity:</b> ${a.rarity}</p>`;
  modal.style.display="flex";
}
function closeModal(){document.getElementById("modal").style.display="none";}
function releaseAnimal(){if(currentModalAnimalIndex!==null){animals.splice(currentModalAnimalIndex,1); localStorage.setItem("wilddex",JSON.stringify(animals)); renderCollection(); renderBadges(); closeModal(); }}

function openTab(id,event){document.querySelectorAll(".section").forEach(s=>s.classList.remove("active")); document.getElementById(id).classList.add("active"); document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active")); event.target.classList.add("active");}
window.onclick=function(e){if(e.target==document.getElementById("modal")) closeModal();}

renderCollection(); renderBadges();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WildDex</title>

<style>

body{
font-family:Arial;
background:#0f0f14;
color:white;
margin:0;
padding:20px;
text-align:center;
}

.tabs button{
padding:10px 20px;
margin:5px;
background:#222;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
position:relative;
border-radius:14px;
padding:10px;
overflow:hidden;
cursor:pointer;
transition:transform .2s;
}

.card:hover{
transform:scale(1.04);
}

.imgBox{
width:100%;
height:140px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border-radius:8px;
overflow:hidden;
}

.imgBox img{
width:100%;
height:100%;
object-fit:cover;
}

.placeholder{
font-size:40px;
opacity:.4;
}

.common{}
.uncommon{box-shadow:0 0 10px #4caf50;}
.rare{box-shadow:0 0 12px #2196f3;}
.epic{box-shadow:0 0 14px #9c27b0;}
.legendary{box-shadow:0 0 18px gold;}

.water{background:#0a2b44;}
.fire{background:#3b0d0d;}
.grass{background:#0f3318;}
.ice{background:#1a2e3a;}
.flying{background:#1f2438;}

.effect{
position:absolute;
inset:0;
pointer-events:none;
opacity:.25;
}

/* WATER shimmer */

.water .effect{
background:
radial-gradient(circle at 30% 30%,rgba(255,255,255,.25),transparent),
radial-gradient(circle at 70% 60%,rgba(255,255,255,.2),transparent);
animation:waterMove 6s infinite linear;
}

@keyframes waterMove{
0%{transform:translateY(0)}
50%{transform:translateY(6px)}
100%{transform:translateY(0)}
}

/* FIRE flames */

.fire .effect{
background:
radial-gradient(circle at 40% 80%,rgba(255,120,0,.5),transparent 60%),
radial-gradient(circle at 60% 70%,rgba(255,60,0,.5),transparent 60%);
animation:flame 3s infinite alternate;
}

@keyframes flame{
0%{transform:scale(1)}
100%{transform:scale(1.08)}
}

/* GRASS leaves */

.grass .effect{
background:
radial-gradient(circle at 30% 70%,rgba(80,255,120,.35),transparent),
radial-gradient(circle at 70% 40%,rgba(120,255,120,.3),transparent);
animation:leaf 7s infinite;
}

@keyframes leaf{
0%{transform:translateX(0)}
50%{transform:translateX(6px)}
100%{transform:translateX(0)}
}

/* ICE frost */

.ice .effect{
background:
radial-gradient(circle at 40% 30%,rgba(200,240,255,.45),transparent),
radial-gradient(circle at 60% 70%,rgba(180,220,255,.35),transparent);
animation:frost 5s infinite alternate;
}

@keyframes frost{
0%{opacity:.2}
100%{opacity:.35}
}

/* FLYING wind */

.flying .effect{
background:
linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
background-size:200% 100%;
animation:wind 4s infinite linear;
}

@keyframes wind{
0%{background-position:0}
100%{background-position:200%}
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
}

.modalContent{
background:#222;
padding:20px;
border-radius:12px;
max-width:400px;
}

.release{
background:#b71c1c;
color:white;
padding:8px 16px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>WildDex</h1>

<div class="tabs">
<button onclick="showTab('log')">Log</button>
<button onclick="showTab('catches')">Catches</button>
<button onclick="showTab('badges')">Badges</button>
</div>

<div id="logTab">

<input id="search" placeholder="Search animal..." oninput="searchAnimals()">

<div id="suggestions"></div>

</div>

<div id="catchesTab" style="display:none">

<select id="sort" onchange="renderCards()">
<option value="rarity">Sort by Rarity</option>
<option value="atk">Sort by Attack</option>
<option value="def">Sort by Defense</option>
</select>

<div class="cards" id="cards"></div>

</div>

<div id="badgesTab" style="display:none">
<p>Badges coming soon</p>
</div>

<div class="modal" id="modal">
<div class="modalContent" id="modalContent"></div>
</div>

<script>

/* ---------- ANIMAL DATASET (sample portion of large set) ---------- */

const animals=[

{name:"Blue Whale",scientific:"Balaenoptera musculus",type:"water",continent:"Ocean",rarity:"legendary",atk:95,def:90},

{name:"Great White Shark",scientific:"Carcharodon carcharias",type:"water",continent:"Ocean",rarity:"rare",atk:90,def:60},

{name:"African Lion",scientific:"Panthera leo",type:"fire",continent:"Africa",rarity:"rare",atk:85,def:70},

{name:"Bengal Tiger",scientific:"Panthera tigris tigris",type:"fire",continent:"Asia",rarity:"rare",atk:90,def:70},

{name:"Gray Wolf",scientific:"Canis lupus",type:"fire",continent:"North America",rarity:"uncommon",atk:70,def:55},

{name:"Polar Bear",scientific:"Ursus maritimus",type:"ice",continent:"Arctic",rarity:"rare",atk:82,def:85},

{name:"Emperor Penguin",scientific:"Aptenodytes forsteri",type:"ice",continent:"Antarctica",rarity:"rare",atk:55,def:70},

{name:"Golden Eagle",scientific:"Aquila chrysaetos",type:"flying",continent:"Europe",rarity:"uncommon",atk:65,def:55},

{name:"Bald Eagle",scientific:"Haliaeetus leucocephalus",type:"flying",continent:"North America",rarity:"uncommon",atk:60,def:50},

{name:"Harpy Eagle",scientific:"Harpia harpyja",type:"flying",continent:"South America",rarity:"rare",atk:85,def:60},

{name:"Giant Panda",scientific:"Ailuropoda melanoleuca",type:"grass",continent:"Asia",rarity:"rare",atk:60,def:80},

{name:"Red Kangaroo",scientific:"Macropus rufus",type:"grass",continent:"Australia",rarity:"uncommon",atk:65,def:55},

{name:"Koala",scientific:"Phascolarctos cinereus",type:"grass",continent:"Australia",rarity:"uncommon",atk:30,def:60},

{name:"Moose",scientific:"Alces alces",type:"grass",continent:"North America",rarity:"uncommon",atk:70,def:75},

{name:"Snow Leopard",scientific:"Panthera uncia",type:"ice",continent:"Asia",rarity:"rare",atk:82,def:65},

{name:"Atlantic Puffin",scientific:"Fratercula arctica",type:"flying",continent:"Europe",rarity:"common",atk:30,def:30},

{name:"Green Sea Turtle",scientific:"Chelonia mydas",type:"water",continent:"Ocean",rarity:"uncommon",atk:40,def:80},

{name:"Poison Dart Frog",scientific:"Dendrobatidae",type:"grass",continent:"South America",rarity:"uncommon",atk:50,def:40},

{name:"Komodo Dragon",scientific:"Varanus komodoensis",type:"fire",continent:"Asia",rarity:"rare",atk:82,def:75}

]

/* ---------- APP DATA ---------- */

let catches=JSON.parse(localStorage.getItem("wilddex")||"[]")

function showTab(tab){

logTab.style.display="none"
catchesTab.style.display="none"
badgesTab.style.display="none"

if(tab==="log")logTab.style.display="block"
if(tab==="catches")catchesTab.style.display="block"
if(tab==="badges")badgesTab.style.display="block"

renderCards()

}

/* ---------- SEARCH ---------- */

function searchAnimals(){

let q=search.value.toLowerCase()

suggestions.innerHTML=""

animals.filter(a=>a.name.toLowerCase().includes(q)).slice(0,10)
.forEach(a=>{

let btn=document.createElement("button")
btn.textContent=a.name

btn.onclick=()=>{

catches.push(a)
localStorage.setItem("wilddex",JSON.stringify(catches))

alert(a.name+" logged!")

}

suggestions.appendChild(btn)

})

}

/* ---------- IMAGE ---------- */

function wikiImage(name){

return "https://source.unsplash.com/300x200/?"+encodeURIComponent(name+" animal")

}

/* ---------- RENDER CARDS ---------- */

function renderCards(){

cards.innerHTML=""

let arr=[...catches]

if(sort.value==="atk")arr.sort((a,b)=>b.atk-a.atk)
if(sort.value==="def")arr.sort((a,b)=>b.def-a.def)

arr.forEach(a=>{

let card=document.createElement("div")
card.className=`card ${a.type} ${a.rarity}`

card.innerHTML=`

<div class="effect"></div>

<div class="imgBox">

<img src="${wikiImage(a.name)}"

onerror="this.style.display='none';this.nextElementSibling.style.display='block'">

<div class="placeholder" style="display:none">🐾</div>

</div>

<h3>${a.name}</h3>

<i>${a.scientific}</i>

<p>${a.continent}</p>

<p>ATK ${a.atk} DEF ${a.def}</p>

`

card.onclick=()=>openModal(a)

cards.appendChild(card)

})

}

/* ---------- MODAL ---------- */

function openModal(a){

modal.style.display="flex"

modalContent.innerHTML=`

<h2>${a.name}</h2>

<p><i>${a.scientific}</i></p>

<p>Element: ${a.type}</p>

<p>Continent: ${a.continent}</p>

<p>Attack: ${a.atk}</p>

<p>Defense: ${a.def}</p>

<p>Rarity: ${a.rarity}</p>

<button class="release" onclick="release('${a.name}')">
Release Animal
</button>

<br><br>

<button onclick="modal.style.display='none'">
Close
</button>

`

}

/* ---------- RELEASE ---------- */

function release(name){

catches=catches.filter(a=>a.name!==name)

localStorage.setItem("wilddex",JSON.stringify(catches))

modal.style.display="none"

renderCards()

}

renderCards()

</script>

</body>
</html>

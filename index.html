<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WildDex Realistic v19</title>
<style>
/* --- Global --- */
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#b7e4d7,#d7f2ff);}
.tabs{display:flex;background:#2c3e50;color:white;}
.tab{padding:14px 22px;cursor:pointer;}
.tab.active{background:#1abc9c;}
.section{display:none;padding:25px;}
.section.active{display:block;}
input, select{padding:10px;font-size:16px;border-radius:8px;border:none;width:240px;}
button{padding:10px 18px;border:none;border-radius:8px;background:#1abc9c;color:white;font-size:16px;cursor:pointer;margin-left:10px;}
.collection{display:grid;grid-template-columns:repeat(auto-fill,260px);gap:24px;}
.card{border-radius:18px;overflow:hidden;color:white;position:relative;display:flex;flex-direction:column;transition:.25s;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.25);}
.card:hover{transform:scale(1.05);}
.card img{width:100%;height:160px;object-fit:cover;background:white;border-bottom:2px solid rgba(0,0,0,0.1);}
.card-header{display:flex;justify-content:space-between;padding:12px;font-weight:bold;}
.card-body{background:rgba(255,255,255,.9);color:black;padding:14px;height:130px;flex:1;}
.stats{display:flex;gap:20px;font-weight:bold;margin-top:8px;}
.footer{display:flex;justify-content:space-between;margin-top:10px;font-size:14px;}
.badges{display:flex;flex-wrap:wrap;gap:20px;}
.badge{background:white;padding:16px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.2);min-width:140px;text-align:center;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;}
.modal-content{background:white;padding:20px;border-radius:12px;width:400px;max-width:90%;max-height:90%;overflow-y:auto;position:relative;}
.modal-close{position:absolute;top:10px;right:12px;font-weight:bold;cursor:pointer;}
.modal img{width:100%;height:220px;object-fit:cover;border-radius:10px;margin-bottom:12px;}
.autocomplete-suggestions{border:1px solid #ccc;background:white;position:absolute;max-height:150px;overflow-y:auto;z-index:1000;width:250px;}
.autocomplete-suggestion{padding:5px;cursor:pointer;}
.autocomplete-suggestion:hover{background:#eee;}

/* Rarity glow */
.card.rare{box-shadow:0 0 10px silver,0 10px 30px rgba(0,0,0,.25);}
.card.epic{box-shadow:0 0 15px purple,0 10px 30px rgba(0,0,0,.25);}
.card.legendary{box-shadow:0 0 20px gold,0 10px 30px rgba(0,0,0,.25);}

/* Element backgrounds */
.card.fire{background:linear-gradient(135deg,#ff7b4b,#ffcc5c);}
.card.water{background:linear-gradient(135deg,#4facfe,#00f2fe);}
.card.grass{background:linear-gradient(135deg,#43e97b,#38f9d7);}
.card.ice{background:linear-gradient(135deg,#7de2fc,#b9b6e5);}
.card.flying{background:linear-gradient(135deg,#89f7fe,#66a6ff);}
.card.normal{background:linear-gradient(135deg,#bdbdbd,#e0e0e0);}

/* Particle overlay */
.card::before{content:"";position:absolute;top:0;left:0;width:100%;height:100%;border-radius:18px;pointer-events:none;z-index:1;background-repeat:no-repeat;background-position:center;background-size:cover;}
.card.fire::before{background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path fill="%23FFD700" d="M10 0 C8 5,12 5,10 10 C14 8,12 12,10 20 C6 12,8 8,10 0 Z"/></svg>');background-size:20px 20px;animation:fireFlicker 1s linear infinite;}
@keyframes fireFlicker{0%{background-position:0 0;}25%{background-position:5px 2px;}50%{background-position:2px 5px;}75%{background-position:4px 1px;}100%{background-position:0 0;}}
.card.water::before{background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="6" fill="rgba(255,255,255,0.3)"/></svg>');background-size:30px 30px;animation:waterRise 6s linear infinite;}
@keyframes waterRise{0%{background-position:0 100%;}100%{background-position:0 -100%;}}
.card.grass::before{background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"><circle cx="5" cy="5" r="4" fill="rgba(255,255,255,0.3)"/></svg>');background-size:20px 20px;animation:grassFloat 5s linear infinite;}
@keyframes grassFloat{0%{background-position:0 100%;}100%{background-position:0 -100%;}}
</style>
</head>
<body>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="showSection('log')">Log</div>
  <div class="tab" onclick="showSection('catches')">Catches</div>
  <div class="tab" onclick="showSection('badges')">Badges</div>
</div>

<!-- --- Log Section --- -->
<div id="log" class="section active">
  <h3>Log an Animal</h3>
  <input id="logInput" placeholder="Type animal name..." oninput="showSuggestions(this.value)">
  <div class="autocomplete-suggestions" id="suggestions"></div>
  <button onclick="logAnimal()">Log Animal</button>
</div>

<!-- --- Catches Section --- -->
<div id="catches" class="section">
  <h3>Your Catches</h3>
  <div class="collection" id="catchCollection"></div>
</div>

<!-- --- Badges Section --- -->
<div id="badges" class="section">
  <h3>Your Badges</h3>
  <div class="badges" id="badgeCollection"></div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">×</span>
    <img id="modalImg">
    <h3 id="modalName"></h3>
    <p id="modalDesc"></p>
  </div>
</div>

<script>
// Tabs
function showSection(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(id).classList.add('active');
}

// Animal Database
const animals=[
  {name:"Tiger",type:"fire",rarity:"rare",continent:"Asia",img:"https://placekitten.com/300/160",desc:"Powerful predator."},
  {name:"Dolphin",type:"water",rarity:"epic",continent:"Oceania",img:"https://placekitten.com/301/160",desc:"Intelligent marine mammal."},
  {name:"Elephant",type:"normal",rarity:"legendary",continent:"Africa",img:"https://placekitten.com/302/160",desc:"Giant land mammal."},
  {name:"Parrot",type:"flying",rarity:"rare",continent:"South America",img:"https://placekitten.com/303/160",desc:"Colorful bird."},
  {name:"Polar Bear",type:"ice",rarity:"epic",continent:"North America",img:"https://placekitten.com/304/160",desc:"Arctic predator."}
];

// Logged animals
let loggedAnimals=[];

// --- Render Cards ---
function renderCollection(list,containerId){
  const container=document.getElementById(containerId);
  container.innerHTML='';
  list.forEach(a=>{
    const card=document.createElement('div');
    card.className=`card ${a.type} ${a.rarity}`;
    card.innerHTML=`
      <img src="${a.img}">
      <div class="card-header">${a.name}</div>
      <div class="card-body">${a.desc}</div>
    `;
    card.onclick=()=>openModal(a);
    container.appendChild(card);
  });
}

// --- Modal ---
function openModal(animal){
  document.getElementById('modal').style.display='flex';
  document.getElementById('modalImg').src=animal.img;
  document.getElementById('modalName').innerText=animal.name;
  document.getElementById('modalDesc').innerText=animal.desc;
}
function closeModal(){document.getElementById('modal').style.display='none';}

// --- Autocomplete Suggestions ---
function showSuggestions(query){
  const suggestions=document.getElementById('suggestions');
  suggestions.innerHTML='';
  if(!query)return;
  animals.filter(a=>a.name.toLowerCase().includes(query.toLowerCase()))
    .forEach(a=>{
      const div=document.createElement('div');
      div.className='autocomplete-suggestion';
      div.innerText=a.name;
      div.onclick=()=>{document.getElementById('logInput').value=a.name;suggestions.innerHTML='';};
      suggestions.appendChild(div);
    });
}

// --- Log Animal ---
function logAnimal(){
  const input=document.getElementById('logInput').value;
  const animal=animals.find(a=>a.name.toLowerCase()===input.toLowerCase());
  if(animal && !loggedAnimals.includes(animal)){
    loggedAnimals.push(animal);
    renderCollection(loggedAnimals,'catchCollection');
    updateBadges();
    document.getElementById('logInput').value='';
    document.getElementById('suggestions').innerHTML='';
    alert(`${animal.name} logged!`);
  } else if(!animal){
    alert('Animal not found.');
  } else {
    alert('Animal already logged.');
  }
}

// --- Badges ---
function updateBadges(){
  const badgeContainer=document.getElementById('badgeCollection');
  badgeContainer.innerHTML='';
  // Badge: Logged an animal from each continent
  const continents=[...new Set(animals.map(a=>a.continent))];
  const loggedContinents=[...new Set(loggedAnimals.map(a=>a.continent))];
  if(continents.every(c=>loggedContinents.includes(c))){
    const badge=document.createElement('div');
    badge.className='badge';
    badge.innerText='🌎 Global Explorer';
    badgeContainer.appendChild(badge);
  }
  // Badge: Logged an animal of each element/type
  const types=[...new Set(animals.map(a=>a.type))];
  const loggedTypes=[...new Set(loggedAnimals.map(a=>a.type))];
  if(types.every(t=>loggedTypes.includes(t))){
    const badge=document.createElement('div');
    badge.className='badge';
    badge.innerText='💥 Element Master';
    badgeContainer.appendChild(badge);
  }
}

// --- Initialize ---
renderCollection(loggedAnimals,'catchCollection');
updateBadges();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WildDex v3</title>
<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#b7e4d7,#d7f2ff);}
.tabs{display:flex;background:#2c3e50;color:white;}
.tab{padding:14px 22px;cursor:pointer;}
.tab.active{background:#1abc9c;}
.section{display:none;padding:25px;}
.section.active{display:block;}
input{padding:10px;font-size:16px;border-radius:8px;border:none;width:240px;}
button{padding:10px 18px;border:none;border-radius:8px;background:#1abc9c;color:white;font-size:16px;cursor:pointer;margin-left:10px;}
.collection{display:grid;grid-template-columns:repeat(auto-fill,260px);gap:24px;}
.card{border-radius:18px;overflow:hidden;color:white;box-shadow:0 10px 30px rgba(0,0,0,.25);transition:.25s;cursor:pointer;position:relative;}
.card:hover{transform:scale(1.05);}
.card.shiny{animation:shine 4s linear infinite;}
@keyframes shine{0%{filter:hue-rotate(0deg);}100%{filter:hue-rotate(360deg);}}
.fire{background:linear-gradient(135deg,#ff7b4b,#ffcc5c);}
.water{background:linear-gradient(135deg,#4facfe,#00f2fe);}
.grass{background:linear-gradient(135deg,#43e97b,#38f9d7);}
.ice{background:linear-gradient(135deg,#7de2fc,#b9b6e5);}
.flying{background:linear-gradient(135deg,#89f7fe,#66a6ff);}
.normal{background:linear-gradient(135deg,#bdbdbd,#e0e0e0);}
.card-header{display:flex;justify-content:space-between;padding:12px;font-weight:bold;}
.card img{width:100%;height:160px;object-fit:cover;background:white;}
.card-body{background:rgba(255,255,255,.9);color:black;padding:14px;}
.stats{display:flex;gap:20px;font-weight:bold;margin-top:8px;}
.footer{display:flex;justify-content:space-between;margin-top:10px;font-size:14px;}
.badges{display:flex;flex-wrap:wrap;gap:20px;}
.badge{background:white;padding:16px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.2);min-width:140px;text-align:center;}
/* Modal Styles */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;}
.modal-content{background:white;padding:20px;border-radius:12px;max-width:400px;width:90%;position:relative;}
.modal-close{position:absolute;top:10px;right:12px;font-weight:bold;cursor:pointer;}
.modal img{width:100%;border-radius:10px;margin-bottom:12px;}
</style>
</head>
<body>
<div class="tabs">
<div class="tab active" onclick="openTab('log')">Log Animal</div>
<div class="tab" onclick="openTab('collection')">Collection</div>
<div class="tab" onclick="openTab('badges')">Badges</div>
</div>

<div id="log" class="section active">
<h2>Log an Animal</h2>
<input id="animalInput" placeholder="e.g. African Lion" />
<button onclick="logAnimal()">Log</button>
</div>

<div id="collection" class="section">
<h2>My WildDex</h2>
<div id="collectionGrid" class="collection"></div>
</div>

<div id="badges" class="section">
<h2>Explorer Badges</h2>
<div id="badgeContainer" class="badges"></div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="modal-close" onclick="closeModal()">✖</span>
<div id="modalContent"></div>
</div>
</div>

<script>
let animals = JSON.parse(localStorage.getItem("wilddex"))||[];

const continents = {lion:"Africa",elephant:"Africa",giraffe:"Africa",zebra:"Africa",tiger:"Asia",panda:"Asia",orangutan:"Asia",kangaroo:"Australia",koala:"Australia",bear:"North America",bison:"North America",moose:"North America",penguin:"Antarctica",seal:"Antarctica",whale:"Ocean",shark:"Ocean",dolphin:"Ocean",eagle:"North America"};

const types = {lion:"fire",tiger:"fire",elephant:"grass",giraffe:"grass",zebra:"grass",penguin:"ice",bear:"ice",whale:"water",shark:"water",dolphin:"water",eagle:"flying",hawk:"flying"};

const typeMoves = {fire:["Savage Roar","Flame Pounce"],water:["Tidal Slam","Splash Charge"],grass:["Vine Whip","Nature Guard"],ice:["Frost Bite","Glacier Punch"],flying:["Sky Dive","Wind Slash"],normal:["Wild Strike","Heavy Charge"]};

function getType(name){name=name.toLowerCase();for(let k in types) if(name.includes(k)) return types[k];return "normal";}
function getContinent(name){name=name.toLowerCase();for(let k in continents) if(name.includes(k)) return continents[k];return "Unknown";}
function animalImage(name){return "https://cdn.jsdelivr.net/gh/ardamavi/AnimalPhotos/"+name.toLowerCase().replaceAll(" ","")+".jpg";}
function random(min,max){return Math.floor(Math.random()*(max-min)+min);}
function rarity(){let r=Math.random();if(r<0.6)return"Common";if(r<0.85)return"Rare";if(r<0.97)return"Epic";return"Legendary";}

function logAnimal(){
  let name=document.getElementById("animalInput").value.trim();
  if(!name) return;
  let type=getType(name),continent=getContinent(name);
  let moves=typeMoves[type]||["Wild Strike"];
  let animal={name,type,continent,atk:random(20,100),def:random(20,100),rarity:rarity(),shiny:Math.random()<0.05,move:moves[random(0,moves.length)]};
  animals.push(animal);
  localStorage.setItem("wilddex",JSON.stringify(animals));
  renderCollection();renderBadges();document.getElementById("animalInput").value="";
}

function renderCollection(){
  let grid=document.getElementById("collectionGrid");grid.innerHTML="";
  animals.forEach((a,i)=>{
    let card=document.createElement("div");
    card.className="card "+a.type+(a.shiny?" shiny":"");
    card.onclick=()=>openModal(a);
    card.innerHTML=`<div class="card-header"><span>${a.name}</span><span>HP ${a.atk+a.def}</span></div>
    <img src="${animalImage(a.name)}" onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/3/3a/Cat03.jpg'">
    <div class="card-body"><div><b>${a.move}</b></div>
    <div class="stats"><span>ATK ${a.atk}</span><span>DEF ${a.def}</span></div>
    <div class="footer"><span>🌍 ${a.continent}</span><span>${a.rarity}</span></div></div>`;
    grid.appendChild(card);
  });
}

function renderBadges(){
  let counts={};animals.forEach(a=>{counts[a.continent]=(counts[a.continent]||0)+1;});
  let container=document.getElementById("badgeContainer");container.innerHTML="";
  for(let c in counts){
    let badge=document.createElement("div");badge.className="badge";
    badge.innerHTML=`<b>${c} Explorer</b><br>${counts[c]} animals logged`;
    container.appendChild(badge);
  }
}

function openModal(a){
  let modal=document.getElementById("modal");
  let content=document.getElementById("modalContent");
  content.innerHTML=`<img src="${animalImage(a.name)}" onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/3/3a/Cat03.jpg'">
  <h3>${a.name}</h3>
  <p><b>Move:</b> ${a.move}</p>
  <p><b>ATK:</b> ${a.atk}</p>
  <p><b>DEF:</b> ${a.def}</p>
  <p><b>HP:</b> ${a.atk+a.def}</p>
  <p><b>Type:</b> ${a.type}</p>
  <p><b>Continent:</b> ${a.continent}</p>
  <p><b>Rarity:</b> ${a.rarity}</p>`;
  modal.style.display="flex";
}

function closeModal(){document.getElementById("modal").style.display="none";}
function openTab(id){document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));event.target.classList.add("active");}

renderCollection();renderBadges();
</script>
</body>
</html>

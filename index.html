<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WildDex</title>

<style>
body{
font-family:Arial;
margin:0;
background:linear-gradient(120deg,#c9f7d6,#cde7ff);
}

.tabs{
display:flex;
background:#333;
color:white;
}

.tab{
padding:15px 20px;
cursor:pointer;
}

.tab.active{
background:#1abc9c;
}

.section{
display:none;
padding:20px;
}

.section.active{
display:block;
}

input{
padding:10px;
font-size:16px;
border-radius:6px;
border:none;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
background:#1abc9c;
color:white;
font-size:16px;
cursor:pointer;
}

.collection{
display:grid;
grid-template-columns:repeat(auto-fill,260px);
gap:20px;
}

.card{
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
cursor:pointer;
display:flex;
flex-direction:column;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
background:white;
}

.card-header{
padding:10px;
font-weight:bold;
display:flex;
justify-content:space-between;
color:white;
}

.card-body{
background:white;
padding:10px;
}

.footer{
display:flex;
justify-content:space-between;
margin-top:8px;
font-size:18px;
}

/* Element colours */

.fire{background:linear-gradient(#ff7043,#ffa726);}
.water{background:linear-gradient(#42a5f5,#26c6da);}
.grass{background:linear-gradient(#66bb6a,#9ccc65);}
.ice{background:linear-gradient(#81d4fa,#b3e5fc);}
.flying{background:linear-gradient(#90caf9,#64b5f6);}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:10px;
width:400px;
max-width:90%;
}

.modal img{
width:100%;
height:200px;
object-fit:cover;
border-radius:6px;
}

</style>
</head>

<body>

<div class="tabs">
<div class="tab active" onclick="openTab('log')">Log</div>
<div class="tab" onclick="openTab('collection')">Catches</div>
<div class="tab" onclick="openTab('badges')">Badges</div>
</div>

<div id="log" class="section active">
<h2>Log Animal</h2>

<input id="animalInput" list="animals">
<datalist id="animals"></datalist>

<button onclick="logAnimal()">Log</button>

</div>

<div id="collection" class="section">
<h2>My Animals</h2>
<div id="grid" class="collection"></div>
</div>

<div id="badges" class="section">
<h2>Badges</h2>
<div id="badgeArea"></div>
</div>

<div id="modal" class="modal">
<div class="modal-box">
<div id="modalContent"></div>
<button onclick="releaseAnimal()">Release Animal</button>
</div>
</div>

<script>

const database=[

{
name:"African Lion",
scientific:"Panthera leo",
type:"fire",
continent:"Africa",
image:"https://upload.wikimedia.org/wikipedia/commons/7/73/Lion_waiting_in_Namibia.jpg"
},

{
name:"Blue Whale",
scientific:"Balaenoptera musculus",
type:"water",
continent:"Ocean",
image:"https://upload.wikimedia.org/wikipedia/commons/5/53/Bluewhale2.jpg"
},

{
name:"Emperor Penguin",
scientific:"Aptenodytes forsteri",
type:"ice",
continent:"Antarctica",
image:"https://upload.wikimedia.org/wikipedia/commons/e/e0/Emperor_Penguin_Manchot_empereur.jpg"
},

{
name:"Bald Eagle",
scientific:"Haliaeetus leucocephalus",
type:"flying",
continent:"North America",
image:"https://upload.wikimedia.org/wikipedia/commons/1/14/Bald_Eagle_Portrait.jpg"
},

{
name:"African Elephant",
scientific:"Loxodonta africana",
type:"grass",
continent:"Africa",
image:"https://upload.wikimedia.org/wikipedia/commons/3/37/African_Bush_Elephant.jpg"
}

]

const typeIcons={
fire:"🔥",
water:"💧",
grass:"🌿",
ice:"❄️",
flying:"🕊️"
}

const continentIcons={
Africa:"🌍",
"North America":"🌎",
Antarctica:"❄️",
Ocean:"🌊"
}

let animals=JSON.parse(localStorage.getItem("wilddex"))||[]
let modalIndex=null

function init(){

let list=document.getElementById("animals")

database.forEach(a=>{
let option=document.createElement("option")
option.value=a.name
list.appendChild(option)
})

render()

}

function logAnimal(){

let name=document.getElementById("animalInput").value

if(!name) return

if(animals.some(a=>a.name===name)){
alert("Already logged")
return
}

let data=database.find(a=>a.name===name)

if(!data){
alert("Animal not found")
return
}

let animal={
...data,
atk:Math.floor(Math.random()*80)+20,
def:Math.floor(Math.random()*80)+20
}

animals.push(animal)

localStorage.setItem("wilddex",JSON.stringify(animals))

render()

}

function render(){

let grid=document.getElementById("grid")
grid.innerHTML=""

animals.forEach((a,i)=>{

let card=document.createElement("div")
card.className="card "+a.type

card.onclick=()=>openModal(i)

card.innerHTML=`

<div class="card-header">
<span>${a.name}</span>
<span>HP ${a.atk+a.def}</span>
</div>

<img src="${a.image}" onerror="this.src='https://via.placeholder.com/260x160?text=No+Image'">

<div class="card-body">

<div>ATK ${a.atk} | DEF ${a.def}</div>

<div class="footer">

<span>${typeIcons[a.type]}</span>
<span>${continentIcons[a.continent]}</span>

</div>

</div>
`

grid.appendChild(card)

})

renderBadges()

}

function renderBadges(){

let counts={}

animals.forEach(a=>{
counts[a.continent]=(counts[a.continent]||0)+1
})

let area=document.getElementById("badgeArea")

area.innerHTML=""

for(let c in counts){

let div=document.createElement("div")

div.innerHTML=`${continentIcons[c]} ${c} Explorer — ${counts[c]} animals`

area.appendChild(div)

}

}

function openModal(i){

modalIndex=i

let a=animals[i]

let modal=document.getElementById("modal")

document.getElementById("modalContent").innerHTML=`

<img src="${a.image}">

<h3>${a.name}</h3>
<i>${a.scientific}</i>

<p>ATK ${a.atk}</p>
<p>DEF ${a.def}</p>
<p>HP ${a.atk+a.def}</p>

<p>Type ${typeIcons[a.type]}</p>
<p>Continent ${continentIcons[a.continent]}</p>

`

modal.style.display="flex"

}

function releaseAnimal(){

animals.splice(modalIndex,1)

localStorage.setItem("wilddex",JSON.stringify(animals))

document.getElementById("modal").style.display="none"

render()

}

function openTab(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

event.target.classList.add("active")

}

window.onclick=function(e){

if(e.target.id==="modal"){
document.getElementById("modal").style.display="none"
}

}

init()

</script>

</body>
</html>

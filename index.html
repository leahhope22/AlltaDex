<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WildDex</title>

<style>

body{
font-family:Arial;
background:#eef3f6;
margin:0;
text-align:center;
}

h1{margin-top:15px}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
}

.tab{
padding:8px 14px;
border-radius:10px;
background:#ddd;
cursor:pointer;
}

.tab.active{background:#bbb}

.page{display:none}
.page.active{display:block}

.controls{
margin-top:10px
}

.controls input,.controls select{
padding:6px;
margin:4px
}

.grid{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
padding:20px
}

.card{
width:220px;
height:340px;
border-radius:16px;
overflow:hidden;
position:relative;
border:2px solid rgba(0,0,0,.2);
transition:.2s;
cursor:pointer;
}

.card:hover{transform:scale(1.04)}

.card-header{
display:flex;
justify-content:space-between;
padding:6px 8px;
font-weight:bold;
font-size:14px;
}

.image-container{
width:100%;
height:160px;
display:flex;
align-items:center;
justify-content:center;
background:white;
border-bottom:2px solid rgba(0,0,0,.1);
overflow:hidden;
position:relative;
}

.image-container img{
width:100%;
height:100%;
object-fit:cover;
}

.no-image{
position:absolute;
font-size:70px;
display:none;
align-items:center;
justify-content:center;
width:100%;
height:100%;
}

.card-body{
padding:8px;
position:relative;
z-index:2;
}

.scientific{
font-style:italic;
font-size:13px;
opacity:.7;
margin-bottom:6px;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:6px;
font-size:14px;
}

.footer{
display:flex;
justify-content:space-between;
margin-top:6px;
font-size:18px;
}

.card-overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
pointer-events:none;
}

/* element colours */

.card.fire{background:linear-gradient(#ffe5d0,#ffd0b0)}
.card.water{background:linear-gradient(#dff4ff,#c8eaff)}
.card.grass{background:linear-gradient(#e4ffd8,#d0f5c2)}
.card.ice{background:linear-gradient(#eaffff,#dff6ff)}
.card.flying{background:linear-gradient(#f0f0ff,#e5e5ff)}

/* rarity glow */

.card.uncommon{box-shadow:0 0 10px rgba(0,200,255,.4)}
.card.rare{box-shadow:0 0 16px rgba(255,150,0,.7)}
.card.legendary{box-shadow:0 0 25px gold}

/* modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:14px;
width:320px;
}

.modal img{
width:100%;
border-radius:10px;
}

.release{
margin-top:10px;
padding:8px 12px;
background:#e74c3c;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.badge{
background:white;
padding:10px;
border-radius:10px;
margin:10px auto;
width:220px;
border:2px solid #ccc;
}

</style>
</head>

<body>

<h1>WildDex</h1>

<div class="tabs">
<div class="tab active" onclick="openPage('log')">Log</div>
<div class="tab" onclick="openPage('catches')">Catches</div>
<div class="tab" onclick="openPage('badges')">Badges</div>
</div>

<div id="log" class="page active">

<input id="animalInput" list="animals" placeholder="Log animal">
<datalist id="animals"></datalist>
<button onclick="logAnimal()">Log</button>

</div>

<div id="catches" class="page">

<div class="controls">

<input id="searchBox" placeholder="Search animals" oninput="renderCollection()">

<select id="filterElement" onchange="renderCollection()">
<option value="all">All Elements</option>
<option value="fire">Fire</option>
<option value="water">Water</option>
<option value="grass">Grass</option>
<option value="ice">Ice</option>
<option value="flying">Flying</option>
</select>

<select id="sortOption" onchange="renderCollection()">
<option value="none">Sort</option>
<option value="rarity">Sort by Rarity</option>
<option value="atk">Sort by ATK</option>
<option value="def">Sort by DEF</option>
</select>

</div>

<div id="collection" class="grid"></div>

</div>

<div id="badges" class="page">
<div id="badgeArea"></div>
</div>

<div id="cardModal" class="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<script>

const typeIcons={fire:"🔥",water:"💧",grass:"🌿",ice:"❄️",flying:"🕊️"}

const continents=["Africa","Europe","Asia","NorthAmerica","SouthAmerica","Australia","Antarctica"]

const types=["fire","water","grass","ice","flying"]

const animals=[]

/* generate 150 animals */

const species=[
"Lion","Tiger","Elephant","Wolf","Fox","Leopard","Jaguar","Cheetah","Hyena","Gorilla",
"Chimpanzee","Baboon","Panda","Koala","Kangaroo","Wombat","Platypus","Dingo","Camel",
"Horse","Donkey","Zebra","Giraffe","Buffalo","Bison","Moose","Deer","Elk","Rabbit",
"Hare","Beaver","Otter","Seal","Walrus","Whale","Dolphin","Shark","Octopus","Squid",
"Eagle","Falcon","Hawk","Owl","Penguin","Albatross","Pelican","Swan","Goose","Duck",
"Crow","Raven","Parrot","Macaw","Toucan","Peacock","Turkey","Chicken","Frog","Toad",
"Salamander","Lizard","Gecko","Iguana","Chameleon","Snake","Cobra","Python","Viper",
"Tortoise","Turtle","Crocodile","Alligator","Ant","Bee","Wasp","Butterfly","Moth",
"Beetle","Dragonfly","Grasshopper","Cricket","Spider","Scorpion"
]

for(let i=0;i<150;i++){

let name=species[i%species.length]+" "+(i+1)

animals.push({

name:name,
scientific:"Species "+(i+1),
type:types[i%types.length],
continent:continents[i%continents.length],
rarity:["common","uncommon","rare","legendary"][i%4],
atk:Math.floor(Math.random()*100),
def:Math.floor(Math.random()*100),
move:"Wild Strike"

})

}

const datalist=document.getElementById("animals")

animals.forEach(a=>{
let o=document.createElement("option")
o.value=a.name
datalist.appendChild(o)
})

let logged=[]

function logAnimal(){

let name=document.getElementById("animalInput").value
let animal=animals.find(a=>a.name===name)
if(!animal)return

logged.push({...animal})

renderCollection()
updateBadges()

}

/* wikipedia image */

async function getImage(name){

try{
let url=`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name.split(" ")[0])}`
let res=await fetch(url)
let data=await res.json()
return data.thumbnail?data.thumbnail.source:""
}catch{return""}

}

/* render cards */

async function renderCollection(){

let area=document.getElementById("collection")
area.innerHTML=""

let search=document.getElementById("searchBox").value.toLowerCase()
let filter=document.getElementById("filterElement").value
let sort=document.getElementById("sortOption").value

let list=[...logged]

if(sort=="atk")list.sort((a,b)=>b.atk-a.atk)
if(sort=="def")list.sort((a,b)=>b.def-a.def)

if(sort=="rarity"){
const order={legendary:4,rare:3,uncommon:2,common:1}
list.sort((a,b)=>order[b.rarity]-order[a.rarity])
}

for(let i=0;i<list.length;i++){

let a=list[i]

if(search && !a.name.toLowerCase().includes(search))continue
if(filter!="all" && a.type!=filter)continue

let img=await getImage(a.name)

let card=document.createElement("div")
card.className=`card ${a.type} ${a.rarity}`

card.onclick=()=>openCard(i,a,img)

card.innerHTML=`

<div class="card-header">
<span>${a.name}</span>
<span>HP ${a.atk+a.def}</span>
</div>

<div class="image-container">
<img src="${img}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
<div class="no-image">🖤</div>
</div>

<div class="card-body">
<div class="scientific">${a.scientific}</div>
<div><b>${a.move}</b></div>

<div class="stats">
<span>ATK ${a.atk}</span>
<span>DEF ${a.def}</span>
</div>

<div class="footer">
<span>${typeIcons[a.type]}</span>
<span>${a.continent}</span>
</div>
</div>
`

area.appendChild(card)

}

}

/* modal card */

function openCard(index,a,img){

let modal=document.getElementById("cardModal")

document.getElementById("modalContent").innerHTML=`

<h2>${a.name}</h2>

<img src="${img}">

<p><i>${a.scientific}</i></p>

<p>Element: ${a.type}</p>
<p>Continent: ${a.continent}</p>

<p>ATK: ${a.atk}</p>
<p>DEF: ${a.def}</p>

<p>Move: ${a.move}</p>

<p>Rarity: ${a.rarity}</p>

<button class="release" onclick="releaseAnimal(${index})">
Release Animal
</button>

<br><br>

<button onclick="closeModal()">Close</button>
`

modal.style.display="flex"

}

function releaseAnimal(i){

logged.splice(i,1)

closeModal()

renderCollection()

updateBadges()

}

function closeModal(){

document.getElementById("cardModal").style.display="none"

}

/* badges */

function updateBadges(){

let badgeArea=document.getElementById("badgeArea")
badgeArea.innerHTML=""

if(logged.length>=10)
badgeArea.innerHTML+=`<div class="badge">📘 Researcher</div>`

if(logged.length>=50)
badgeArea.innerHTML+=`<div class="badge">🌍 Master Explorer</div>`

}

/* tabs */

function openPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
event.target.classList.add("active")

}

</script>

</body>
</html>

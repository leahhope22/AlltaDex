<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WildDex</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#74ebd5,#acb6e5);
}

header{
background:#333;
color:white;
padding:15px;
text-align:center;
font-size:26px;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
}

.tab{
padding:10px 20px;
background:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.section{display:none;padding:20px;}
.active{display:block}

select,button{
padding:10px;
font-size:16px;
margin:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:15px;
justify-content:center;
}

/* CARD */

.card{
position:relative;
border-radius:12px;
padding:10px;
color:white;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
overflow:hidden;
}

/* Element Colors */

.grass{background:#34c759;}
.fire{background:#ff6b3d;}
.water{background:#3da5ff;}
.air{background:#9ad9ff;}
.dark{background:#444;}

/* IMAGE */

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
background:white;
position:relative;
z-index:2;
}

/* EFFECT LAYER */

.effect{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
opacity:0.25;
z-index:1;
pointer-events:none;
}

/* GRASS LEAVES */

.grass .effect{
background:
radial-gradient(circle at 20% 40%,rgba(255,255,255,0.4) 2px,transparent 3px),
radial-gradient(circle at 70% 60%,rgba(255,255,255,0.3) 2px,transparent 3px);
animation:leafMove 8s linear infinite;
}

@keyframes leafMove{
0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}
}

/* FIRE */

.fire .effect{
background:
radial-gradient(circle at 50% 80%,rgba(255,200,0,0.6),transparent 70%);
animation:fireFlicker 2s infinite alternate;
}

@keyframes fireFlicker{
from{opacity:0.2}
to{opacity:0.35}
}

/* WATER */

.water .effect{
background:repeating-linear-gradient(
0deg,
rgba(255,255,255,0.2) 0px,
rgba(255,255,255,0.2) 2px,
transparent 3px,
transparent 6px
);
animation:wave 6s linear infinite;
}

@keyframes wave{
from{background-position:0 0}
to{background-position:0 40px}
}

/* AIR */

.air .effect{
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.3),
transparent
);
animation:wind 4s linear infinite;
}

@keyframes wind{
from{transform:translateX(-100%)}
to{transform:translateX(100%)}
}

/* DARK */

.dark .effect{
background:radial-gradient(circle,rgba(0,0,0,0.6),transparent 70%);
animation:darkPulse 5s infinite;
}

@keyframes darkPulse{
0%{opacity:0.2}
50%{opacity:0.35}
100%{opacity:0.2}
}

</style>
</head>

<body>

<header>🌍 WildDex</header>

<div class="tabs">
<div class="tab" onclick="openTab('log')">Log</div>
<div class="tab" onclick="openTab('catches')">Catches</div>
</div>

<!-- LOG TAB -->

<div id="log" class="section active">

<select id="animalSelect">
<option value="">Select Animal</option>
</select>

<button onclick="logAnimal()">Log Animal</button>

</div>

<!-- CATCH TAB -->

<div id="catches" class="section">
<div class="grid" id="grid"></div>
</div>

<script>

/* DATABASE (5 animals only for testing) */

const animals = [

{
name:"Blue Whale",
type:"water",
image:"https://upload.wikimedia.org/wikipedia/commons/5/56/Bluewhale2.jpg"
},

{
name:"Tiger",
type:"fire",
image:"https://upload.wikimedia.org/wikipedia/commons/5/56/Tiger.50.jpg"
},

{
name:"Bald Eagle",
type:"air",
image:"https://upload.wikimedia.org/wikipedia/commons/1/1a/Bald_Eagle_Portrait.jpg"
},

{
name:"Oak Tree Frog",
type:"grass",
image:"https://upload.wikimedia.org/wikipedia/commons/7/7b/Oak_treefrog.jpg"
},

{
name:"Lesser Horseshoe Bat",
type:"dark",
image:"https://upload.wikimedia.org/wikipedia/commons/f/f2/Rhinolophus_hipposideros.jpg"
}

]

let logged = JSON.parse(localStorage.getItem("wilddex")) || []

/* Populate dropdown */

const select=document.getElementById("animalSelect")

animals.forEach(a=>{
let opt=document.createElement("option")
opt.value=a.name
opt.textContent=a.name
select.appendChild(opt)
})

function logAnimal(){

let name=select.value
if(!name)return

if(logged.find(a=>a.name===name)){
alert("Already logged!")
return
}

let animal=animals.find(a=>a.name===name)

logged.push(animal)

localStorage.setItem("wilddex",JSON.stringify(logged))

render()

}

/* Render cards */

function render(){

const grid=document.getElementById("grid")

grid.innerHTML=""

logged.forEach(a=>{

let card=document.createElement("div")

card.className=`card ${a.type}`

card.innerHTML=`

<div class="effect"></div>

<img src="${a.image}" onerror="this.src=''">

<h3>${a.name}</h3>

`

grid.appendChild(card)

})

}

render()

/* Tabs */

function openTab(id){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WildDex v14</title>
<style>
body {font-family:Arial;margin:0;background:linear-gradient(135deg,#b7e4d7,#d7f2ff);}
.tabs {display:flex;background:#2c3e50;color:white;}
.tab {padding:14px 22px;cursor:pointer;}
.tab.active {background:#1abc9c;}
.section {display:none;padding:25px;}
.section.active {display:block;}
input {padding:10px;font-size:16px;border-radius:8px;border:none;width:240px;}
button {padding:10px 18px;border:none;border-radius:8px;background:#1abc9c;color:white;font-size:16px;cursor:pointer;margin-left:10px;}
.collection {display:grid;grid-template-columns:repeat(auto-fill,260px);gap:24px;}
.card {border-radius:18px;overflow:hidden;color:white;position:relative;display:flex;flex-direction:column;transition:.25s;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.25);}
.card:hover{transform:scale(1.05);}
.card img{width:100%;height:160px;object-fit:cover;background:white;border-bottom:2px solid rgba(0,0,0,0.1);}
.card-header{display:flex;justify-content:space-between;padding:12px;font-weight:bold;}
.card-body{background:rgba(255,255,255,.9);color:black;padding:14px;height:130px;flex:1;}
.stats{display:flex;gap:20px;font-weight:bold;margin-top:8px;}
.footer{display:flex;justify-content:space-between;margin-top:10px;font-size:14px;}
.badges{display:flex;flex-wrap:wrap;gap:20px;}
.badge{background:white;padding:16px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.2);min-width:140px;text-align:center;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;}
.modal-content{background:white;padding:20px;border-radius:12px;width:400px;max-width:90%;max-height:90%;overflow-y:auto;position:relative;}
.modal-close{position:absolute;top:10px;right:12px;font-weight:bold;cursor:pointer;}
.modal img{width:100%;height:220px;object-fit:cover;border-radius:10px;margin-bottom:12px;}
.autocomplete-suggestions{border:1px solid #ccc;background:white;position:absolute;max-height:150px;overflow-y:auto;z-index:1000;width:250px;}
.autocomplete-suggestion{padding:5px;cursor:pointer;}
.autocomplete-suggestion:hover{background:#eee;}

/* Rarity glow */
.card.rare { box-shadow:0 0 10px silver,0 10px 30px rgba(0,0,0,.25);}
.card.epic { box-shadow:0 0 15px purple,0 10px 30px rgba(0,0,0,.25);}
.card.legendary { box-shadow:0 0 20px gold,0 10px 30px rgba(0,0,0,.25);}

/* --- Element Effects --- */
.card::before {content:"";position:absolute;top:0;left:0;width:100%;height:100%;border-radius:18px;pointer-events:none;z-index:1;}

/* FIRE: flicker + sparks */
.card.fire::before {
  pointer-events:none;
  border-radius:18px;
  box-shadow: inset 0 0 10px rgba(255,120,0,0.3);
  animation: fireFlicker 1.2s infinite alternate;
}
@keyframes fireFlicker {
  0% { box-shadow: inset 0 0 10px rgba(255,120,0,0.3); }
  50% { box-shadow: inset 0 0 25px rgba(255,200,0,0.5); transform: scale(1.01);}
  100% { box-shadow: inset 0 0 10px rgba(255,120,0,0.3); }
}

/* WATER: floating bubbles */
.card.water::before {
  pointer-events:none;
  background:none;
}
.card.water::after {
  content:"";
  position:absolute; top:0; left:0; width:100%; height:100%; border-radius:inherit; pointer-events:none;
  background: radial-gradient(circle, rgba(255,255,255,0.4) 20%, transparent 20%) no-repeat;
  background-size: 20px 20px;
  animation: waterBubbles 5s linear infinite;
}
@keyframes waterBubbles {
  0% { background-position: 10% 100%, 50% 90%, 80% 95%; }
  50% { background-position: 15% 50%, 52% 40%, 78% 45%; }
  100% { background-position: 12% 0%, 48% -10%, 82% 0%; }
}

/* GRASS: swaying leaves */
.card.grass::before {
  content:"";
  position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;
  background: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0 5px, transparent 5px 10px);
  animation: grassWave 4s ease-in-out infinite;
}
@keyframes grassWave {
  0% { transform: translateY(0); }
  50% { transform: translateY(4px); }
  100% { transform: translateY(0); }
}

/* ICE: drifting snowflakes */
.card.ice::before {
  content:"";
  position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;
  background: radial-gradient(circle, rgba(255,255,255,0.6) 2px, transparent 2px);
  background-size: 15px 15px;
  animation: iceDrift 6s linear infinite;
}
@keyframes iceDrift { 0% {background-position:0 0;} 100% {background-position:100% 100%;} }

/* FLYING: wind streaks */
.card.flying::before {
  content:"";
  position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;
  background: repeating-linear-gradient(90deg, rgba(255,255,255,0.15) 0 5px, transparent 5px 10px);
  background-size: 20px 20px;
  animation: flyingWind 4s linear infinite;
}
@keyframes flyingWind { 0% {background-position:0 0;} 100% {background-position:100% 0;} }

/* NORMAL: no element */
.card.normal::before { background:none; }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="openTab('log', event)">Log Animal</div>
  <div class="tab" onclick="openTab('collection', event)">Collection</div>
  <div class="tab" onclick="openTab('badges', event)">Badges</div>
</div>

<div id="log" class="section active">
  <h2>Log an Animal</h2>
  <div style="position:relative;">
    <input id="animalInput" placeholder="Start typing an animal name..." oninput="showSuggestions()" autocomplete="off"/>
    <div id="suggestions" class="autocomplete-suggestions"></div>
  </div>
  <button onclick="logAnimal()">Log</button>
</div>

<div id="collection" class="section">
  <h2>My WildDex</h2>
  <div id="collectionGrid" class="collection"></div>
</div>

<div id="badges" class="section">
  <h2>Explorer Badges</h2>
  <div id="badgeContainer" class="badges"></div>
</div>

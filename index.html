<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animal Card Collector</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

header{
background:#000;
padding:15px;
font-size:22px;
font-weight:bold;
}

#tabs{
display:flex;
justify-content:center;
gap:10px;
margin:20px;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

#catchTab,#cardsTab{
display:none;
}

.active{
display:block;
}

select{
padding:8px;
margin:10px;
}

#cardContainer{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.card{
width:200px;
border-radius:14px;
overflow:hidden;
cursor:pointer;
box-shadow:0 0 10px rgba(0,0,0,0.6);
position:relative;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.cardContent{
padding:10px;
}

.type{
font-size:12px;
opacity:0.8;
}

/* element colours */

.fire{background:linear-gradient(135deg,#ff6a00,#ff0000);}
.water{background:linear-gradient(135deg,#0099ff,#0044ff);}
.ice{background:linear-gradient(135deg,#9fe8ff,#5ac8fa);}
.flying{background:linear-gradient(135deg,#b5d6ff,#6aa9ff);}
.dark{background:linear-gradient(135deg,#333,#000);}
.poison{background:linear-gradient(135deg,#8e2de2,#4a00e0);}
.bug{background:linear-gradient(135deg,#9acd32,#4b8b00);}

</style>
</head>

<body>

<header>Animal Card Collector</header>

<div id="tabs">
<button onclick="showTab('catchTab')">Catch</button>
<button onclick="showTab('cardsTab')">Cards</button>
</div>

<div id="catchTab" class="active">

<h2>Log Animal</h2>

<select id="animalSelect"></select>

<br>

<button onclick="logAnimal()">Catch Animal</button>

</div>

<div id="cardsTab">

<h2>Your Cards</h2>

<div id="cardContainer"></div>

</div>

<script>

function showTab(tab){

document.getElementById("catchTab").classList.remove("active")
document.getElementById("cardsTab").classList.remove("active")

document.getElementById(tab).classList.add("active")

}

/* animal database */

const animals=[

{
name:"African Lion",
scientific:"Panthera leo",
type:"fire",
rarity:"rare",
image:"https://upload.wikimedia.org/wikipedia/commons/7/73/Lion_waiting_in_Namibia.jpg"
},

{
name:"Blue Whale",
scientific:"Balaenoptera musculus",
type:"water",
rarity:"legendary",
image:"https://upload.wikimedia.org/wikipedia/commons/5/5e/Bluewhale1.jpg"
},

{
name:"Polar Bear",
scientific:"Ursus maritimus",
type:"ice",
rarity:"rare",
image:"https://upload.wikimedia.org/wikipedia/commons/e/e2/Polar_Bear_-_Alaska.jpg"
},

{
name:"Bald Eagle",
scientific:"Haliaeetus leucocephalus",
type:"flying",
rarity:"uncommon",
image:"https://upload.wikimedia.org/wikipedia/commons/1/1a/Bald_Eagle_Portrait.jpg"
},

{
name:"Poison Dart Frog",
scientific:"Dendrobatidae",
type:"poison",
rarity:"uncommon",
image:"https://upload.wikimedia.org/wikipedia/commons/f/f3/Dendrobates_pumilio.jpg"
},

{
name:"Ladybug",
scientific:"Coccinellidae",
type:"bug",
rarity:"common",
image:"https://upload.wikimedia.org/wikipedia/commons/7/70/Coccinella_septempunctata.jpg"
},

{
name:"Barn Owl",
scientific:"Tyto alba",
type:["flying","dark"],
rarity:"uncommon",
image:"https://upload.wikimedia.org/wikipedia/commons/1/19/Tyto_alba_-British_Wildlife_Centre-8a.jpg"
},

{
name:"Lesser Horseshoe Bat",
scientific:"Rhinolophus hipposideros",
type:["dark","flying"],
rarity:"uncommon",
image:"https://upload.wikimedia.org/wikipedia/commons/6/69/Rhinolophus_hipposideros.jpg"
}

]

/* populate dropdown */

const select=document.getElementById("animalSelect")

animals.forEach((a,i)=>{
let option=document.createElement("option")
option.value=i
option.textContent=a.name
select.appendChild(option)
})

let caught=[]

function logAnimal(){

let index=select.value

caught.push(animals[index])

renderCards()

}

/* render cards */

function renderCards(){

const container=document.getElementById("cardContainer")

container.innerHTML=""

caught.forEach(animal=>{

let card=document.createElement("div")
card.classList.add("card")

let type=animal.type

if(Array.isArray(type)){
card.classList.add(type[0])
}else{
card.classList.add(type)
}

card.innerHTML=`

<img src="${animal.image}">

<div class="cardContent">

<h3>${animal.name}</h3>

<div class="type">${Array.isArray(type)?type.join(" / "):type}</div>

</div>

`

container.appendChild(card)

})

}

</script>

</body>
</html>

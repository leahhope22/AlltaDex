<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WildDex</title>

<style>
body{
  font-family:Verdana;
  background:#aaf0c6;
  margin:0;
  text-align:center;
}
h1{margin-top:15px;}
.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}
.tab{
  padding:8px 14px;
  border-radius:10px;
  background:#ddd;
  cursor:pointer;
}
.tab.active{background:#bbb;}
.page{display:none;}
.page.active{display:block;}
.grid{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
  padding:20px;
}
.card{
  width:220px;
  height:340px;
  border-radius:16px;
  overflow:hidden;
  position:relative;
  border:2px solid rgba(0,0,0,.2);
  transition:.2s;
  color:#111;
  cursor:pointer;
}
.card:hover{transform:scale(1.03);}
.card-header{
  display:flex;
  justify-content:space-between;
  padding:6px 8px;
  font-weight:bold;
  font-size:14px;
}
.image-container{
  width:100%;
  height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
  border-bottom:2px solid rgba(0,0,0,.1);
  overflow:hidden;
  position:relative;
}
.image-container img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.card-body{
  padding:8px;
  position:relative;
  z-index:2;
}
.scientific{
  font-style:italic;
  font-size:13px;
  opacity:.7;
  margin-bottom:6px;
}
.stats{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
  font-size:14px;
}
.footer{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
  font-size:18px;
}
.card-overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
  pointer-events:none;
  border-radius:inherit;
}

/* Rarity glow */
.card.common{box-shadow:none;}
.card.uncommon{box-shadow:0 0 10px rgba(0,200,255,.4);}
.card.rare{box-shadow:0 0 10px rgba(180,0,255,.6);}

.card.legendary{
  box-shadow:0 0 18px rgba(255,215,0,.9),0 0 30px rgba(255,215,0,.6),0 0 45px rgba(255,215,0,.3);
  animation:legendPulse 3s infinite alternate;
}
@keyframes legendPulse{
  from{filter:brightness(1)}
  to{filter:brightness(1.15)}
}

/* Element colors */
.card.fire{background:linear-gradient(#ffe5d0,#ffd0b0);}
.card.water{background:linear-gradient(#dff4ff,#c8eaff);}
.card.grass{background:linear-gradient(#e4ffd8,#d0f5c2);}
.card.ice{background:linear-gradient(#eaffff,#dff6ff);}
.card.flying{background:linear-gradient(#f0f0ff,#e5e5ff);}
.card.dark{background:linear-gradient(#ccc,#676c73);}
.card.poison{background:linear-gradient(#f0d0ff,#e0b0ff);}
.card.bug{background:linear-gradient(#e0f5b0,#c8e88c);}
.card.electric{background:linear-gradient(#fff6b0,#ffe066);}

/* Element effects */
/* Fire */
.card.fire .card-overlay{
  background:
    radial-gradient(circle at 50% 100%, rgba(255,120,0,.25), transparent 70%),
    radial-gradient(circle at 60% 110%, rgba(255,60,0,.2), transparent 70%);
  animation:fireFlicker 2s infinite alternate;
}
@keyframes fireFlicker{0%{transform:translateY(0)}100%{transform:translateY(-3px) scale(1.03)}}

/* Water */
.card.water .card-overlay{
  background:
    linear-gradient(120deg,transparent,rgba(0,150,255,.15),transparent);
  animation:waterFlow 4s linear infinite;
}
@keyframes waterFlow{from{background-position:-200px}to{background-position:200px}}

/* Grass */
.card.grass .card-overlay{
  background:
    radial-gradient(circle, rgba(0,200,0,.15), transparent 70%);
  animation:grassBreathe 5s infinite alternate;
}
@keyframes grassBreathe{from{opacity:.3}to{opacity:.6}}

/* Ice */
.card.ice .card-overlay::before{
  content:'';
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;
  background:
    radial-gradient(circle, rgba(255,255,255,.25) 1px, transparent 2px),
    radial-gradient(circle, rgba(200,240,255,.2) 1px, transparent 2px);
  background-size:10px 10px, 15px 15px;
  animation:iceGlitter 3s linear infinite;
}
@keyframes iceGlitter{
  0%{background-position:0 0,0 0;}
  50%{background-position:5px 5px,7px 3%;}
  100%{background-position:0 10px,0 15px;}
}

/* Flying */
.card.flying .card-overlay{
  background:
    linear-gradient(90deg,transparent,rgba(180,180,255,.15),transparent);
  animation:windMove 6s linear infinite;
}
@keyframes windMove{from{background-position:-400px}to{background-position:400px}}

/* Dark */
.card.dark .card-overlay{
  background:
    radial-gradient(circle, rgba(0,0,0,.15), transparent 70%);
  animation:darkParticles 5s linear infinite;
}
.card.electric .card-overlay{
  background:
    linear-gradient(120deg, transparent, rgba(255,255,0,.35), transparent);
  animation:electricFlash 2s linear infinite;
}

@keyframes electricFlash{
  from{background-position:-200px}
  to{background-position:200px}
}
/* Poison */
.card.poison .card-overlay::before{
  content:'';
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;
  background:
    radial-gradient(circle, rgba(120,0,120,.2) 20%, transparent 80%),
    radial-gradient(circle, rgba(180,0,180,.15) 20%, transparent 80%);
  background-size:60px 60px, 40px 40px;
  animation:poisonSmoke 5s linear infinite;
}
@keyframes poisonSmoke{
  0%{background-position:0 100%,50px 80%;}
  50%{background-position:30px 50%,20px 30%;}
  100%{background-position:0 0,50px -50%;}
}

/* Bug */
.card.bug .card-overlay{
  background:
    radial-gradient(circle, rgba(50,200,50,.15), transparent 70%);
  animation:bugParticles 4s linear infinite;
}
@keyframes bugParticles{from{background-position:0 0}to{background-position:30px 30px}}

/* Dual type overlay */
.card[data-type2] .card-overlay::before{
  content:'';
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;
  opacity:0.35;
  z-index:1;
}
/* Card detail modal */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:16px;
  max-width:420px;
  width:90%;
  max-height:80vh;
  overflow-y:auto;
  text-align:center;
}

.modal img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:10px;
}

.close{
  float:right;
  cursor:pointer;
  font-weight:bold;
  font-size:18px;
}  
</style>
</head>

<div id="animalModal" class="modal" onclick="closeModal(event)">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <h2 id="modalName"></h2>
    <img id="modalImg">
    <p id="modalScientific"></p>
    <p id="modalMove"></p>
    <p id="modalStats"></p>
    <p id="modalType"></p>

Release
</button>
  </div>
</div>

<h1>WildDex</h1>

<div class="tabs">
  <div class="tab active" onclick="openPage('log')">Log</div>
  <div class="tab" onclick="openPage('catches')">Catches</div>
  <div class="tab" onclick="openPage('badges')">Badges</div>
</div>

<div id="log" class="page active">

<div id="catches" class="page">

  <div id="collection" class="grid"></div>
</div>

<div id="badges" class="page">
  <div id="badgeArea"></div>
</div>

const datalist=document.getElementById("animals")
animals.forEach(a=>{let o=document.createElement("option");o.value=a.name;datalist.appendChild(o);});

let logged = JSON.parse(localStorage.getItem("wilddex_logged")) || [];

function logAnimal(){
  let name = document.getElementById("animalInput").value.trim();
  let animal = animals.find(a => a.name === name);
  let message = document.getElementById("logMessage");

  if(!animal){
    message.textContent="Animal not found.";
    message.style.color="red";
    return;
  }

  // check using the animal's official name
  if(logged.some(a => a.name === animal.name)){
    message.textContent="You've already logged this animal.";
    message.style.color="orange";
    return;
  }

  logged.push(animal);

  localStorage.setItem("wilddex_logged", JSON.stringify(logged));

  message.textContent="New animal logged!";
  message.style.color="green";

  document.getElementById("animalInput").value="";
  document.getElementById("animalInput").focus();

  renderCollection();
  updateBadges();
}

async function getImage(name){
  try{
    let url=`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`;
    let res=await fetch(url);
    let data=await res.json();
    return data.thumbnail ? data.thumbnail.source : "";
  }catch{return "";}
}

async function renderCollection(){
  let area=document.getElementById("collection");
  area.innerHTML="";
  let search=document.getElementById("searchBox").value.toLowerCase();
  let filter=document.getElementById("filterElement").value;
  for(let a of logged){
    if(search && !a.name.toLowerCase().includes(search)) continue;
    if(filter!="all" && a.type!=filter) continue;
    let img=await getImage(a.name);
    let card=document.createElement("div");
card.onclick=()=>openAnimal(a,img);
    card.className=`card ${a.type} ${a.rarity}`;
    if(a.type2) card.dataset.type2=a.type2;
    card.innerHTML=`
      <div class="card-header">
        <span>${a.name}</span>
        <span>HP ${a.atk+a.def}</span>
      </div>
      <div class="image-container">
        <img src="${img}" alt="${a.name}">
      </div>
      <div class="card-body">
        <div class="card-overlay"></div>
        <div class="scientific">${a.scientific}</div>
        <div><b>${a.move}</b></div>
        <div class="stats">
          <span>ATK ${a.atk}</span>
          <span>DEF ${a.def}</span>
        </div>
        <div class="footer">
          <span>${typeIcons[a.type]}${a.type2?` ${typeIcons[a.type2]}`:""}</span>
          <span>${continentIcons[a.continent]}</span>
        </div>
      </div>
    `;
    area.appendChild(card);
  }
}

function updateBadges(){
  let badgeArea=document.getElementById("badgeArea");
  badgeArea.innerHTML="";
  let continents=[...new Set(logged.map(a=>a.continent))];
  let elements=[...new Set(logged.map(a=>a.type))];
  if(continents.length>=3) badgeArea.innerHTML+=`<div class="badge">🌍 Explorer Badge</div>`;
  if(elements.length>=3) badgeArea.innerHTML+=`<div class="badge">⚡ Elementalist Badge</div>`;
  if(logged.length>=5) badgeArea.innerHTML+=`<div class="badge">📘 Field Researcher</div>`;
}

function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");
}
let currentAnimal=null;
function openAnimal(a,img){
  currentAnimal=a;
  document.getElementById("modalName").textContent=a.name;
  document.getElementById("modalImg").src=img;
  document.getElementById("modalScientific").textContent="Scientific: "+a.scientific;
  document.getElementById("modalMove").textContent="Move: "+a.move;
  document.getElementById("modalStats").textContent=`ATK ${a.atk} | DEF ${a.def} | HP ${a.atk+a.def}`;
  document.getElementById("modalType").textContent=`Type: ${a.type}${a.type2?" / "+a.type2:""}`;
  document.getElementById("modalContinent").textContent="Continent: "+a.continent;
  document.getElementById("animalModal").style.display="flex";
}

function closeModal(e){
  if(!e || e.target.id==="animalModal" || e.target.className==="close"){
    document.getElementById("animalModal").style.display="none";
  }
}

function releaseAnimal(){
  if(!currentAnimal) return;

  logged = logged.filter(a => a.name !== currentAnimal.name);
 localStorage.setItem("wilddex_logged", JSON.stringify(logged));
  closeModal();
  renderCollection();
  updateBadges();
}
</script>
</body>
</html>

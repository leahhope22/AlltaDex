<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WildDex</title>

<style>
body{
  font-family:Verdana;
  background:#aaf0c6;
  margin:0;
  text-align:center;
}
h1{margin-top:15px;}
.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}
.tab{
  padding:8px 14px;
  border-radius:10px;
  background:#ddd;
  cursor:pointer;
}
.tab.active{background:#bbb;}
.page{display:none;}
.page.active{display:block;}
.grid{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
  padding:20px;
}

.card{
  width:220px;
  height:340px;
  border-radius:16px;
  overflow:hidden;
  position:relative;
  border:2px solid rgba(0,0,0,.2);
  transition:.2s;
  color:#111;
  cursor:pointer;
}

.card:hover{transform:scale(1.03);}

.card-header{
  display:flex;
  justify-content:space-between;
  padding:6px 8px;
  font-weight:bold;
  font-size:14px;
}

.image-container{
  width:100%;
  height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
  border-bottom:2px solid rgba(0,0,0,.1);
  overflow:hidden;
  position:relative;
}

.image-container img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card-body{
  padding:8px;
  position:relative;
  z-index:2;
}

.scientific{
  font-style:italic;
  font-size:13px;
  opacity:.7;
  margin-bottom:6px;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
  font-size:14px;
}

.footer{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
  font-size:18px;
}

.card-overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
  pointer-events:none;
  border-radius:inherit;
}

/* Rarity glow */

.card.common{box-shadow:none;}
.card.uncommon{box-shadow:0 0 10px rgba(0,200,255,.4);}
.card.rare{box-shadow:0 0 10px rgba(180,0,255,.6);}

.card.legendary{
  box-shadow:0 0 18px rgba(255,215,0,.9),0 0 30px rgba(255,215,0,.6),0 0 45px rgba(255,215,0,.3);
  animation:legendPulse 3s infinite alternate;
}

@keyframes legendPulse{
  from{filter:brightness(1)}
  to{filter:brightness(1.15)}
}

/* Element colors */

.card.fire{background:linear-gradient(#ffe5d0,#ffd0b0);}
.card.water{background:linear-gradient(#dff4ff,#c8eaff);}
.card.grass{background:linear-gradient(#e4ffd8,#d0f5c2);}
.card.ice{background:linear-gradient(#eaffff,#dff6ff);}
.card.flying{background:linear-gradient(#f0f0ff,#e5e5ff);}
.card.dark{background:linear-gradient(#ccc,#676c73);}
.card.poison{background:linear-gradient(#f0d0ff,#e0b0ff);}
.card.bug{background:linear-gradient(#e0f5b0,#c8e88c);}
.card.electric{background:linear-gradient(#fff6b0,#ffe066);}

/* ===================== */
/* MODAL STYLING (NEW) */
/* ===================== */

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.6);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.modal-content{
  background:white;
  padding:25px;
  border-radius:16px;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.close{
  float:right;
  cursor:pointer;
  font-size:20px;
}

#releaseBtn{
  margin-top:15px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  background:#ff5c5c;
  color:white;
  cursor:pointer;
}

#releaseBtn:hover{
  background:#ff3c3c;
}

</style>
</head>

<body>

<h1>WildDex</h1>

<div class="tabs">
  <div class="tab active" onclick="openPage('log')">Log</div>
  <div class="tab" onclick="openPage('catches')">Catches</div>
  <div class="tab" onclick="openPage('badges')">Badges</div>
</div>

<div id="log" class="page active">
  <input id="animalInput" list="animals" placeholder="Log animal">
  <datalist id="animals"></datalist>
  <button onclick="logAnimal()">Log</button>
</div>

<div id="catches" class="page">
  <div class="controls">
    <input id="searchBox" placeholder="Search animals" oninput="renderCollection()">
    <select id="filterElement" onchange="renderCollection()">
      <option value="all">All Elements</option>
      <option value="fire">Fire</option>
      <option value="water">Water</option>
      <option value="grass">Grass</option>
      <option value="ice">Ice</option>
      <option value="flying">Flying</option>
      <option value="dark">Dark</option>
      <option value="poison">Poison</option>
      <option value="bug">Bug</option>
      <option value="electric">Electric</option>
    </select>
  </div>

  <div id="collection" class="grid"></div>
</div>

<div id="badges" class="page">
  <div id="badgeArea"></div>
</div>

<!-- ===================== -->
<!-- MODAL HTML (NEW) -->
<!-- ===================== -->

<div id="animalModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>

    <h2 id="modalName"></h2>
    <p id="modalScientific"></p>
    <p id="modalMove"></p>
    <p id="modalStats"></p>
    <p id="modalType"></p>
    <p id="modalContinent"></p>

    <button id="releaseBtn">Release</button>
  </div>
</div>

<script>

const typeIcons={fire:"🔥", water:"💧", grass:"🌿", ice:"❄️", flying:"🕊️", dark:"🌑", poison:"☣️", bug:"🐛",electric:"⚡"};
const continentIcons={Africa:"🌍", Europe:"🌍", Asia:"🌏", NorthAmerica:"🌎", SouthAmerica:"🌎", Australia:"🦘", Antarctica:"🧊"};

const animals=[/* your entire animal list remains unchanged */];

const datalist=document.getElementById("animals")
animals.forEach(a=>{
  let o=document.createElement("option");
  o.value=a.name;
  datalist.appendChild(o);
});

let logged=[];

function logAnimal(){
  let name=document.getElementById("animalInput").value;
  let animal=animals.find(a=>a.name===name);
  if(!animal || logged.some(l=>l.name===name)) return;
  logged.push(animal);
  renderCollection();
  updateBadges();
}

async function getImage(name){
  try{
    let url=`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`;
    let res=await fetch(url);
    let data=await res.json();
    return data.thumbnail ? data.thumbnail.source : "";
  }catch{return "";}
}

async function renderCollection(){

  let area=document.getElementById("collection");
  area.innerHTML="";

  let search=document.getElementById("searchBox").value.toLowerCase();
  let filter=document.getElementById("filterElement").value;

  for(let a of logged){

    if(search && !a.name.toLowerCase().includes(search)) continue;
    if(filter!="all" && a.type!=filter) continue;

    let img=await getImage(a.name);

    let card=document.createElement("div");
    card.className=`card ${a.type} ${a.rarity}`;

    if(a.type2) card.dataset.type2=a.type2;

    card.onclick=()=>openModal(a);  // ⭐ CLICK CARD

    card.innerHTML=`
      <div class="card-header">
        <span>${a.name}</span>
        <span>HP ${a.atk+a.def}</span>
      </div>

      <div class="image-container">
        <img src="${img}" alt="${a.name}">
      </div>

      <div class="card-body">
        <div class="card-overlay"></div>

        <div class="scientific">${a.scientific}</div>
        <div><b>${a.move}</b></div>

        <div class="stats">
          <span>ATK ${a.atk}</span>
          <span>DEF ${a.def}</span>
        </div>

        <div class="footer">
          <span>${typeIcons[a.type]}${a.type2?` ${typeIcons[a.type2]}`:""}</span>
          <span>${continentIcons[a.continent]}</span>
        </div>
      </div>
    `;

    area.appendChild(card);
  }
}

/* ===================== */
/* MODAL FUNCTIONS */
/* ===================== */

function openModal(animal){

  document.getElementById("modalName").textContent=animal.name;
  document.getElementById("modalScientific").textContent=animal.scientific;
  document.getElementById("modalMove").textContent="Move: "+animal.move;
  document.getElementById("modalStats").textContent=`ATK ${animal.atk} | DEF ${animal.def}`;
  document.getElementById("modalType").textContent="Type: "+animal.type+(animal.type2?` / ${animal.type2}`:"");
  document.getElementById("modalContinent").textContent="Continent: "+animal.continent;

  document.getElementById("animalModal").style.display="flex";

  document.getElementById("releaseBtn").onclick=()=>{
    logged=logged.filter(a=>a.name!==animal.name);
    renderCollection();
    updateBadges();
    closeModal();
  };

}

function closeModal(){
  document.getElementById("animalModal").style.display="none";
}

function updateBadges(){
  let badgeArea=document.getElementById("badgeArea");
  badgeArea.innerHTML="";
  let continents=[...new Set(logged.map(a=>a.continent))];
  let elements=[...new Set(logged.map(a=>a.type))];
  if(continents.length>=3) badgeArea.innerHTML+=`<div class="badge">🌍 Explorer Badge</div>`;
  if(elements.length>=3) badgeArea.innerHTML+=`<div class="badge">⚡ Elementalist Badge</div>`;
  if(logged.length>=5) badgeArea.innerHTML+=`<div class="badge">📘 Field Researcher</div>`;
}

function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");
}

</script>
</body>
</html>

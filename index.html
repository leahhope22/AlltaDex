<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WildDex</title>

<style>
body{
  font-family:Arial;
  background:#eef3f6;
  margin:0;
  text-align:center;
}

h1{margin-top:15px;}

.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:10px;
}

.tab{
  padding:8px 14px;
  border-radius:10px;
  background:#ddd;
  cursor:pointer;
}

.tab.active{background:#bbb;}

.page{display:none;}
.page.active{display:block;}

.grid{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  justify-content:center;
  padding:20px;
}

.card{
  width:220px;
  height:340px;
  border-radius:16px;
  overflow:hidden;
  position:relative;
  border:2px solid rgba(0,0,0,.2);
  transition:.2s;
  color:#111;
  cursor:pointer;
}

.card:hover{transform:scale(1.03)}

.card-header{
  display:flex;
  justify-content:space-between;
  padding:6px 8px;
  font-weight:bold;
  font-size:14px;
}

.image-container{
  width:100%;
  height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
  border-bottom:2px solid rgba(0,0,0,.1);
  overflow:hidden;
  position:relative;
}

.image-container img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card-body{
  padding:8px;
  position:relative;
  z-index:2;
}

.scientific{
  font-style:italic;
  font-size:13px;
  opacity:.7;
  margin-bottom:6px;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
  font-size:14px;
}

.footer{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
  font-size:18px;
}

/* overlay for particle effects */
.card-overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none;
}

/* rarity glow */
.card.common{box-shadow:none;}
.card.uncommon{box-shadow:0 0 10px rgba(0,200,255,.4);}
.card.rare{box-shadow:0 0 12px rgba(255,150,0,.6),0 0 20px rgba(255,150,0,.4);}
.card.legendary{box-shadow:0 0 18px rgba(255,215,0,.9),0 0 30px rgba(255,215,0,.6),0 0 45px rgba(255,215,0,.3);animation:legendPulse 3s infinite alternate;}
@keyframes legendPulse{from{filter:brightness(1)} to{filter:brightness(1.15)}}

/* ELEMENT COLORS */
.card.fire{background:linear-gradient(135deg,#ffe5d0,#ffd0b0);}
.card.water{background:linear-gradient(135deg,#dff4ff,#c8eaff);}
.card.grass{background:linear-gradient(135deg,#e4ffd8,#d0f5c2);}
.card.ice{background:linear-gradient(135deg,#eaffff,#dff6ff);}
.card.flying{background:linear-gradient(135deg,#f0f0ff,#e5e5ff);}
.card.dark{background:linear-gradient(135deg,#dcdcdc,#bdbdbd);}
.card.poison{background:linear-gradient(135deg,#f3e4ff,#e5d4ff);}
.card.bug{background:linear-gradient(135deg,#f0ffd8,#d0ffb0);}

/* Particle effects for elements */
.card.fire .card-overlay{
  background: radial-gradient(circle, rgba(255,140,0,0.15) 10%, transparent 40%), radial-gradient(circle, rgba(255,180,50,0.1) 15%, transparent 50%);
  animation:fireParticles 3s linear infinite;
}
@keyframes fireParticles{
  0%{background-position:0 0,50% 100%}
  50%{background-position:0 -20px,50% 80%}
  100%{background-position:0 0,50% 100%}
}

.card.water .card-overlay{
  background: radial-gradient(circle, rgba(0,150,255,0.1) 10%, transparent 40%), radial-gradient(circle, rgba(50,200,255,0.1) 15%, transparent 50%);
  animation:waterParticles 5s linear infinite;
}
@keyframes waterParticles{
  0%{background-position:0 0,50% 100%}
  50%{background-position:0 -25px,50% 85%}
  100%{background-position:0 0,50% 100%}
}

.card.grass .card-overlay{
  background: radial-gradient(circle, rgba(0,200,0,0.1) 10%, transparent 40%), radial-gradient(circle, rgba(50,255,50,0.1) 15%, transparent 50%);
  animation:grassParticles 4s linear infinite;
}
@keyframes grassParticles{
  0%{background-position:0 0,50% 100%}
  50%{background-position:0 -15px,50% 90%}
  100%{background-position:0 0,50% 100%}
}

.card.ice .card-overlay{
  background: radial-gradient(circle, rgba(180,255,255,0.1) 10%, transparent 40%), radial-gradient(circle, rgba(200,240,255,0.1) 15%, transparent 50%);
  animation:iceParticles 4s linear infinite;
}
@keyframes iceParticles{
  0%{background-position:0 0,50% 100%}
  50%{background-position:0 -15px,50% 85%}
  100%{background-position:0 0,50% 100%}
}

.card.flying .card-overlay{
  background: radial-gradient(circle, rgba(180,180,255,0.1) 10%, transparent 40%), radial-gradient(circle, rgba(200,200,255,0.1) 15%, transparent 50%);
  animation:flyingParticles 6s linear infinite;
}
@keyframes flyingParticles{
  0%{background-position:0 0,50% 100%}
  50%{background-position:0 -20px,50% 80%}
  100%{background-position:0 0,50% 100%}
}

.card.dark .card-overlay{
  background: radial-gradient(circle, rgba(0,0,0,0.1) 10%, transparent 40%), radial-gradient(circle, rgba(50,50,50,0.1) 15%, transparent 50%);
  animation:darkParticles 5s linear infinite;
}
@keyframes darkParticles{
  0%{background-position:0 0,50% 100%}
  50%{background-position:0 -20px,50% 80%}
  100%{background-position:0 0,50% 100%}
}

.card.poison .card-overlay{
  background: radial-gradient(circle, rgba(180,0,180,0.1) 10%, transparent 40%), radial-gradient(circle, rgba(220,50,220,0.1) 15%, transparent 50%);
  animation:poisonParticles 5s linear infinite;
}
@keyframes poisonParticles{
  0%{background-position:0 0,50% 100%}
  50%{background-position:0 -20px,50% 80%}
  100%{background-position:0 0,50% 100%}
}

.card.bug .card-overlay{
  background: radial-gradient(circle, rgba(50,200,50,0.1) 10%, transparent 40%), radial-gradient(circle, rgba(100,255,50,0.1) 15%, transparent 50%);
  animation:bugParticles 4s linear infinite;
}
@keyframes bugParticles{
  0%{background-position:0 0,50% 100%}
  50%{background-position:0 -15px,50% 90%}
  100%{background-position:0 0,50% 100%}
}

/* controls */
.controls{
  margin-top:10px;
}
.controls input, .controls select{
  padding:6px;
  margin:4px;
}

.badge{
  background:white;
  padding:10px;
  border-radius:10px;
  margin:10px auto;
  width:220px;
  border:2px solid #ccc;
}
</style>
</head>
<body>

<h1>WildDex</h1>

<div class="tabs">
  <div class="tab active" onclick="openPage('log')">Log</div>
  <div class="tab" onclick="openPage('catches')">Catches</div>
  <div class="tab" onclick="openPage('badges')">Badges</div>
</div>

<div id="log" class="page active">
<input id="animalInput" list="animals" placeholder="Log animal">
<datalist id="animals"></datalist>
<button onclick="logAnimal()">Log</button>
</div>

<div id="catches" class="page">
<div class="controls">
<input id="searchBox" placeholder="Search animals" oninput="renderCollection()">
<select id="filterElement" onchange="renderCollection()">
<option value="all">All Elements</option>
<option value="fire">Fire</option>
<option value="water">Water</option>
<option value="grass">Grass</option>
<option value="ice">Ice</option>
<option value="flying">Flying</option>
<option value="dark">Dark</option>
<option value="poison">Poison</option>
<option value="bug">Bug</option>
</select>
</div>
<div id="collection" class="grid"></div>
</div>

<div id="badges" class="page">
<div id="badgeArea"></div>
</div>

<script>
const typeIcons={fire:"🔥", water:"💧", grass:"🌿", ice:"❄️", flying:"🕊️", dark:"🌙", poison:"☠️", bug:"🐛"}
const continentIcons={Africa:"🌍", Europe:"🌍", Asia:"🌏", NorthAmerica:"🌎", SouthAmerica:"🌎", Australia:"🦘", Antarctica:"🧊"}

const animals=[
{name:"African Lion",scientific:"Panthera leo",type:"fire",continent:"Africa",rarity:"rare",atk:80,def:70,move:"Flame Pounce"},
{name:"Bald Eagle",scientific:"Haliaeetus leucocephalus",type:"flying",continent:"NorthAmerica",rarity:"uncommon",atk:60,def:50,move:"Sky Dive"},
{name:"Polar Bear",scientific:"Ursus maritimus",type:"ice",continent:"Antarctica",rarity:"rare",atk:75,def:80,move:"Frozen Swipe"},
{name:"Poison Dart Frog",scientific:"Dendrobatidae",type:"poison",continent:"SouthAmerica",rarity:"uncommon",atk:40,def:30,move:"Toxic Jump"},
{name:"Blue Whale",scientific:"Balaenoptera musculus",type:"water",continent:"Asia",rarity:"legendary",atk:90,def:90,move:"Ocean Surge"},
{name:"Lesser Horseshoe Bat",scientific:"Rhinolophus hipposideros",type:["dark","flying"],continent:"Europe",rarity:"uncommon",atk:35,def:30,move:"Night Echo"},
{name:"Goliath Stick Insect",scientific:"Eurycnema goliath",type:["bug","grass"],continent:"Australia",rarity:"rare",atk:20,def:40,move:"Leaf Grip"},
{name:"Box Jellyfish",scientific:"Chironex fleckeri",type:["water","poison"],continent:"Australia",rarity:"rare",atk:50,def:20,move:"Toxic Sting"}
]

const datalist=document.getElementById("animals")
animals.forEach(a=>{let o=document.createElement("option"); o.value=a.name; datalist.appendChild(o);})

let logged=[]

function logAnimal(){
  let name=document.getElementById("animalInput").value
  let animal=animals.find(a=>a.name===name)
  if(!animal) return
  if(logged.find(a=>a.name===name)) return
  logged.push(animal)
  renderCollection()
  updateBadges()
}

async function getImage(name){
  try{
    let url=`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`
    let res=await fetch(url)
    let data=await res.json()
    return data.thumbnail ? data.thumbnail.source : ""
  }catch{return ""}
}

async function renderCollection(){
  let area=document.getElementById("collection")
  area.innerHTML=""
  let search=document.getElementById("searchBox").value.toLowerCase()
  let filter=document.getElementById("filterElement").value

  for(let a of logged){
    if(search && !a.name.toLowerCase().includes(search)) continue
    let types = Array.isArray(a.type)?a.type:a.type
    if(filter!="all" && (Array.isArray(types)?!types.includes(filter):a.type!=filter)) continue

    let img=await getImage(a.name)
    let card=document.createElement("div")

    if(Array.isArray(a.type) && a.type.length==2){
      const colors={
        fire:'linear-gradient(135deg,#ffe5d0,#ffd0b0)',
        water:'linear-gradient(135deg,#dff4ff,#c8eaff)',
        grass:'linear-gradient(135deg,#e4ffd8,#d0f5c2)',
        ice:'linear-gradient(135deg,#eaffff,#dff6ff)',
        flying:'linear-gradient(135deg,#f0f0ff,#e5e5ff)',
        dark:'linear-gradient(135deg,#dcdcdc,#bdbdbd)',
        poison:'linear-gradient(135deg,#f3e4ff,#e5d4ff)',
        bug:'linear-gradient(135deg,#f0ffd8,#d0ffb0)'
      };
      card.style.background=`${colors[a.type[0]]}, ${colors[a.type[1]]}`;
      card.className=`card ${a.rarity}`;
    } else {
      card.className=`card ${Array.isArray(a.type)?a.type[0]:a.type} ${a.rarity}`;
    }

    card.innerHTML=`
      <div class="card-header">
        <span>${a.name}</span>
        <span>HP ${a.atk+a.def}</span>
      </div>
      <div class="image-container">
        <img src="${img}" alt="${a.name}">
      </div>
      <div class="card-body">
        <div class="card-overlay"></div>
        <div class="scientific">${a.scientific}</div>
        <div><b>${a.move}</b></div>
        <div class="stats">
          <span>ATK ${a.atk}</span>
          <span>DEF ${a.def}</span>
        </div>
        <div class="footer">
          <span>${Array.isArray(a.type)?a.type.map(t=>typeIcons[t]).join(' '):typeIcons[a.type]}</span>
          <span>${continentIcons[a.continent]}</span>
        </div>
      </div>
    `
    area.appendChild(card)
  }
}

function updateBadges(){
  let badgeArea=document.getElementById("badgeArea")
  badgeArea.innerHTML=""
  let continents=[...new Set(logged.map(a=>a.continent))]
  let elements=[...new Set(logged.flatMap(a=>Array.isArray(a.type)?a.type:[a.type]))]

  if(continents.length>=3)
    badgeArea.innerHTML+=`<div class="badge">🌍 Explorer Badge</div>`
  if(elements.length>=3)
    badgeArea.innerHTML+=`<div class="badge">⚡ Elementalist Badge</div>`
  if(logged.length>=5)
    badgeArea.innerHTML+=`<div class="badge">📘 Field Researcher</div>`
}

function openPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
  document.getElementById(id).classList.add("active")
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
  event.target.classList.add("active")
}
</script>
</body>
</html>

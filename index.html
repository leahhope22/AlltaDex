<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WildDex vFull</title>
<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#a3f0ba,#d7f2ff);}
.tabs{display:flex;background:#2c3e50;color:white;}
.tab{padding:14px 22px;cursor:pointer;}
.tab.active{background:#1abc9c;}
.section{display:none;padding:25px;}
.section.active{display:block;}
input,select{padding:10px;font-size:16px;border-radius:8px;border:none;width:240px;margin-bottom:10px;}
button{padding:10px 18px;border:none;border-radius:8px;background:#1abc9c;color:white;font-size:16px;cursor:pointer;margin-left:10px;}
.collection{display:grid;grid-template-columns:repeat(auto-fill,260px);gap:24px;}
.card{border-radius:18px;overflow:hidden;color:white;box-shadow:0 10px 30px rgba(0,0,0,.25);transition:.25s;cursor:pointer;position:relative;height:350px;display:flex;flex-direction:column;}
.card:hover{transform:scale(1.05);}
.card img{width:100%;height:160px;object-fit:cover;background:white;}
.card-body{background:rgba(255,255,255,.9);color:black;padding:10px;flex:1;display:flex;flex-direction:column;justify-content:space-between;}
.card-header{padding:12px;font-weight:bold;display:flex;justify-content:space-between;}
.stats{display:flex;gap:15px;font-weight:bold;margin-top:6px;}
.footer{display:flex;justify-content:space-between;margin-top:6px;font-size:14px;}
.badges{display:flex;flex-wrap:wrap;gap:20px;}
.badge{background:white;padding:16px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.2);min-width:140px;text-align:center;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;}
.modal-content{background:white;padding:20px;border-radius:12px;width:400px;max-width:90%;max-height:90%;overflow-y:auto;position:relative;}
.modal-close{position:absolute;top:10px;right:12px;font-weight:bold;cursor:pointer;}
.modal img{width:100%;height:220px;object-fit:cover;border-radius:10px;margin-bottom:12px;}
.autocomplete-suggestions{border:1px solid #ccc;background:white;position:absolute;max-height:150px;overflow-y:auto;z-index:1000;width:250px;}
.autocomplete-suggestion{padding:5px;cursor:pointer;}
.autocomplete-suggestion:hover{background:#eee;}

/* Rarity Glow */
.card.common{}
.card.rare{box-shadow:0 0 10px silver,0 10px 30px rgba(0,0,0,.25);}
.card.epic{box-shadow:0 0 15px purple,0 10px 30px rgba(0,0,0,.25);}
.card.legendary{box-shadow:0 0 20px gold,0 10px 30px rgba(0,0,0,.25);}

/* Element Colors */
.card.fire{background:linear-gradient(135deg,#ff7b4b,#ffcc5c);}
.card.water{background:linear-gradient(135deg,#4facfe,#00f2fe);}
.card.grass{background:linear-gradient(135deg,#43e97b,#38f9d7);}
.card.ice{background:linear-gradient(135deg,#7de2fc,#b9b6e5);}
.card.flying{background:linear-gradient(135deg,#89f7fe,#66a6ff);}
.card.dark{background:linear-gradient(135deg,#2f2f2f,#555);}
.card.electric{background:linear-gradient(135deg,#fff200,#ffd500);}
.card.poison{background:linear-gradient(135deg,#a24fab,#d46fc0);}
.card.normal{background:linear-gradient(135deg,#bdbdbd,#e0e0e0);}

/* Element Effects */
.card.fire::before{
  content:"";position:absolute;top:0;left:0;width:100%;height:160px;pointer-events:none;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"><path fill="%23FFD700" d="M10 0 C8 5,12 5,10 10 C14 8,12 12,10 20 C6 12,8 8,10 0 Z"/></svg>');
  background-size:20px 20px;animation:fireFlicker 1s linear infinite;}
@keyframes fireFlicker{0%{background-position:0 0;}25%{background-position:5px 2px;}50%{background-position:2px 5px;}75%{background-position:4px 1px;}100%{background-position:0 0;}}
.card.water::before{
  content:"";position:absolute;top:0;left:0;width:100%;height:160px;pointer-events:none;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="6" fill="rgba(255,255,255,0.3)"/></svg>');
  background-size:30px 30px;animation:waterRise 6s linear infinite;}
@keyframes waterRise{0%{background-position:0 100%;}100%{background-position:0 -100%;}}
.card.grass::before{
  content:"";position:absolute;top:0;left:0;width:100%;height:160px;pointer-events:none;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"><path fill="%23008000" d="M0 0 L4 6 L8 0 Z"/></svg>');
  background-size:20px 20px;animation:leafSway 3s ease-in-out infinite;}
@keyframes leafSway{0%{background-position:0 0;}50%{background-position:5px 2px;}100%{background-position:0 0;}}
.card.ice::before{
  content:"";position:absolute;top:0;left:0;width:100%;height:160px;pointer-events:none;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"><circle cx="4" cy="4" r="2" fill="%23fff"/></svg>');
  background-size:10px 10px;animation:iceSparkle 2s linear infinite;}
@keyframes iceSparkle{0%{opacity:0.5;}50%{opacity:1;}100%{opacity:0.5;}}
.card.flying::before{
  content:"";position:absolute;top:0;left:0;width:100%;height:160px;pointer-events:none;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg"><path stroke="%23fff" stroke-width="1" d="M0 8 L20 0 M0 4 L20 8"/></svg>');
  background-size:20px 20px;animation:windMove 3s linear infinite;}
@keyframes windMove{0%{background-position:0 0;}100%{background-position:20px 0;}}

/* Ensure content stays visible */
.card img, .card-body, .card-header{position:relative;z-index:2;}
</style>
</head>
<body>

<div class="tabs">
<div class="tab active" onclick="openTab('log')">Log Animal</div>
<div class="tab" onclick="openTab('collection')">Collection</div>
<div class="tab" onclick="openTab('badges')">Badges</div>
</div>

<div id="log" class="section active">
<h2>Log an Animal</h2>
<div style="position:relative;">
<input id="animalInput" placeholder="Start typing an animal name..." oninput="showSuggestions()" autocomplete="off"/>
<div id="suggestions" class="autocomplete-suggestions"></div>
</div>
<button onclick="logAnimal()">Log</button>
</div>

<div id="collection" class="section">
<h2>My WildDex</h2>
Sort by: 
<select id="sortSelect" onchange="renderCollection()">
<option value="rarity">Rarity</option>
<option value="continent">Continent</option>
</select>
<div id="collectionGrid" class="collection"></div>
</div>

<div id="badges" class="section">
<h2>Explorer Badges</h2>
<div id="badgeContainer" class="badges"></div>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<span class="modal-close" onclick="closeModal()">✖</span>
<div id="modalContent"></div>
<button onclick="releaseAnimal()">Release Animal</button>
</div>
</div>

<script>
// --- Animals (20 for test) ---
const animalDatabase=[
{name:"Blue Whale",scientific:"Balaenoptera musculus",type:["water"],continent:["Ocean"],image:"https://upload.wikimedia.org/wikipedia/commons/5/53/Bluewhale2.jpg"},
{name:"African Lion",scientific:"Panthera leo",type:["fire"],continent:["Africa"],image:"https://upload.wikimedia.org/wikipedia/commons/7/73/Lion_waiting_in_Namibia.jpg"},
{name:"Tiger",scientific:"Panthera tigris",type:["fire"],continent:["Asia"],image:"https://upload.wikimedia.org/wikipedia/commons/5/56/Tiger.50.jpg"},
{name:"Elephant",scientific:"Loxodonta africana",type:["grass"],continent:["Africa"],image:"https://upload.wikimedia.org/wikipedia/commons/3/37/African_Bush_Elephant.jpg"},
{name:"Giraffe",scientific:"Giraffa camelopardalis",type:["grass"],continent:["Africa"],image:"https://upload.wikimedia.org/wikipedia/commons/9/9f/Giraffa_camelopardalis_angolensis.jpg"},
{name:"Zebra",scientific:"Equus quagga",type:["grass"],continent:["Africa"],image:"https://upload.wikimedia.org/wikipedia/commons/0/0f/Plains_Zebra_Equus_quagga.jpg"},
{name:"Dolphin",scientific:"Delphinus delphis",type:["water"],continent:["Ocean"],image:"https://upload.wikimedia.org/wikipedia/commons/6/63/Common_dolphin_2.jpg"},
{name:"Penguin",scientific:"Aptenodytes forsteri",type:["ice"],continent:["Antarctica"],image:"https://upload.wikimedia.org/wikipedia/commons/e/e0/Emperor_Penguin_Manchot_empereur.jpg"},
{name:"Bald Eagle",scientific:"Haliaeetus leucocephalus",type:["flying"],continent:["North America"],image:"https://upload.wikimedia.org/wikipedia/commons/1/14/Bald_Eagle_Portrait.jpg"},
{name:"Polar Bear",scientific:"Ursus maritimus",type:["ice"],continent:["Arctic"],image:"https://upload.wikimedia.org/wikipedia/commons/e/e6/Polar_Bear_AdF.jpg"},
{name:"European Lynx",scientific:"Lynx lynx",type:["normal"],continent:["Europe"],image:"https://upload.wikimedia.org/wikipedia/commons/5/50/Lynx_lynx_Luc_Viatour.jpg"},
{name:"Horseshoe Bat",scientific:"Rhinolophus ferrumequinum",type:["dark","flying"],continent:["Europe","Asia"],image:"https://upload.wikimedia.org/wikipedia/commons/0/0b/Horseshoe_bat.jpg"},
{name:"Green Finch",scientific:"Chloris chloris",type:["flying"],continent:["Europe"],image:"https://upload.wikimedia.org/wikipedia/commons/1/1e/Chloris_chloris01.jpg"},
{name:"Electric Eel",scientific:"Electrophorus electricus",type:["electric","water"],continent:["South America"],image:"https://upload.wikimedia.org/wikipedia/commons/8/8a/Electric_eel.jpg"},
{name:"Poison Dart Frog",scientific:"Dendrobates auratus",type:["poison","water"],continent:["South America"],image:"https://upload.wikimedia.org/wikipedia/commons/1/17/Poison_dart_frog.jpg"},
{name:"Arctic Fox",scientific:"Vulpes lagopus",type:["ice"],continent:["Arctic"],image:"https://upload.wikimedia.org/wikipedia/commons/8/8b/Arctic_Fox.jpg"},
{name:"Red Fox",scientific:"Vulpes vulpes",type:["fire"],continent:["Europe","Asia","North America"],image:"https://upload.wikimedia.org/wikipedia/commons/1/1d/Red_Fox.jpg"},
{name:"Brown Bear",scientific:"Ursus arctos",type:["normal"],continent:["Europe","Asia","North America"],image:"https://upload.wikimedia.org/wikipedia/commons/7/70/Ursus_arctos.jpg"},
{name:"Great White Shark",scientific:"Carcharodon carcharias",type:["water"],continent:["Ocean"],image:"https://upload.wikimedia.org/wikipedia/commons/5/56/Great_white_shark.jpg"},
{name:"Kangaroo",scientific:"Macropus rufus",type:["normal"],continent:["Australia"],image:"https://upload.wikimedia.org/wikipedia/commons/0/0c/Kangaroo_Australia_01.jpg"}
];

// --- Type & Continent Icons ---
const typeIcons={fire:"🔥",water:"💧",grass:"🌿",ice:"❄️",flying:"🕊️",normal:"⚪",dark:"🌑",electric:"⚡",poison:"☠️"};
const continentIcons={Africa:"🌍",Asia:"🌏",Europe:"🌍","North America":"🌎","South America":"🌎",Australia:"🌏",Antarctica:"❄️",Ocean:"🌊",Arctic:"❄️"};

let animals=JSON.parse(localStorage.getItem("wilddex"))||[];
let currentModalAnimalIndex=null;

function showSuggestions(){
  const input=document.getElementById("animalInput");
  const sugg=document.getElementById("suggestions");
  const val=input.value.toLowerCase();
  sugg.innerHTML="";
  if(!val) return;
  animalDatabase.forEach(a=>{
    if(a.name.toLowerCase().includes(val) && !animals.find(x=>x.name===a.name)){
      const div=document.createElement("div");
      div.className="autocomplete-suggestion";
      div.innerText=a.name;
      div.onclick=()=>{input.value=a.name;sugg.innerHTML="";};
      sugg.appendChild(div);
    }
  });
}

function random(min,max){return Math.floor(Math.random()*(max-min)+min);}
function rarity(){let r=Math.random();if(r<0.6)return"common";if(r<0.85)return"rare";if(r<0.97)return"epic";return"legendary";}

function logAnimal(){
  let name=document.getElementById("animalInput").value.trim();
  if(!name) return;
  if(animals.find(a=>a.name===name)){alert("Already logged");return;}
  let dbAnimal=animalDatabase.find(a=>a.name===name);
  if(!dbAnimal){alert("Animal not in database"); return;}
  let moves=["Wild Strike","Heavy Charge"];
  dbAnimal.type.forEach(t=>{
    if(t==="fire") moves=["Flame Pounce","Savage Roar"];
    if(t==="water") moves=["Tidal Slam","Splash Charge"];
    if(t==="grass") moves=["Vine Whip","Nature Guard"];
    if(t==="ice") moves=["Frost Bite","Glacier Punch"];
    if(t==="flying") moves=["Sky Dive","Wind Slash"];
    if(t==="dark") moves=["Shadow Claw","Night Bite"];
    if(t==="electric") moves=["Spark Bolt","Thunder Shock"];
    if(t==="poison") moves=["Venom Fang","Toxic Spray"];
  });
  let animal={...dbAnimal,atk:random(20,100),def:random(20,100),rarity:rarity(),shiny:Math.random()<0.05,move:moves[random(0,moves.length)]};
  animals.push(animal);
  localStorage.setItem("wilddex",JSON.stringify(animals));
  renderCollection();renderBadges();
  document.getElementById("animalInput").value="";
}

function renderCollection(){
  const grid=document.getElementById("collectionGrid");
  grid.innerHTML="";
  let sort=document.getElementById("sortSelect").value;
  let sorted=[...animals];
  if(sort==="rarity") sorted.sort((a,b)=>["common","rare","epic","legendary"].indexOf(b.rarity)-["common","rare","epic","legendary"].indexOf(a.rarity));
  if(sort==="continent") sorted.sort((a,b)=>a.continent[0].localeCompare(b.continent[0]));
  sorted.forEach((a,i)=>{
    const card=document.createElement("div");
    card.className="card "+a.type[0]+" "+a.rarity+(a.shiny?" shiny":"");
    card.onclick=()=>openModal(i);
    let imgHtml=`<img src="${a.image}" onerror="this.src='https://via.placeholder.com/260x160?text=No+Image'">`;
    card.innerHTML=`<div class="card-header"><span>${a.name}</span><span>HP ${a.atk+a.def}</span></div>
      ${imgHtml}
      <div class="card-body">
        <div><b>${a.move}</b></div>
        <div class="stats"><span>ATK ${a.atk}</span><span>DEF ${a.def}</span></div>
        <div class="footer">
          <span>${a.type.map(t=>typeIcons[t]).join(" ")}</span>
          <span>${a.continent.map(c=>continentIcons[c]).join(" ")}</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function renderBadges(){
  let counts={};
  animals.forEach(a=>a.continent.forEach(c=>counts[c]=(counts[c]||0)+1));
  const container=document.getElementById("badgeContainer");container.innerHTML="";
  for(let c in counts){
    const badge=document.createElement("div");badge.className="badge";
    badge.innerHTML=`<b>${continentIcons[c]} ${c} Explorer</b><br>${counts[c]} animals logged`;
    container.appendChild(badge);
  }
}

function openModal(index){
  currentModalAnimalIndex=index;
  const a=animals[index];
  const modal=document.getElementById("modal");
  const content=document.getElementById("modalContent");
  content.innerHTML=`<img src="${a.image}" onerror="this.src='https://via.placeholder.com/400x220?text=No+Image'">
    <h3>${a.name} <i>(${a.scientific})</i></h3>
    <p><b>Move:</b> ${a.move}</p>
    <p><b>ATK:</b> ${a.atk}</p>
    <p><b>DEF:</b> ${a.def}</p>
    <p><b>HP:</b> ${a.atk+a.def}</p>
    <p><b>Type:</b> ${a.type.map(t=>typeIcons[t]).join(" ")}</p>
    <p><b>Continent:</b> ${a.continent.map(c=>continentIcons[c]).join(" ")}</p>
    <p><b>Rarity:</b> ${a.rarity}</p>`;
  modal.style.display="flex";
}

function closeModal(){document.getElementById("modal").style.display="none";}

function releaseAnimal(){
  if(currentModalAnimalIndex!==null){
    animals.splice(currentModalAnimalIndex,1);
    localStorage.setItem("wilddex",JSON.stringify(animals));
    renderCollection();renderBadges();closeModal();
  }
}

window.onclick=function(e){if(e.target==document.getElementById("modal")) closeModal();}
function openTab(id){document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));event.target.classList.add("active");}

renderCollection();renderBadges();
</script>
</body>
</html>
